<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sparkle Studio | Pro Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050206; 
  --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
  --gold-static: #aa771c;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { 
    background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    background-image: radial-gradient(circle at 50% -20%, #2a0a2f 0%, #050206 70%);
}

.header { padding: env(safe-area-inset-top, 20px) 24px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
.studio-logo { font-family: 'Marcellus', serif; font-size: 1.2rem; letter-spacing: 4px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
.stat-pill { background: var(--glass); border: 1px solid var(--glass-border); padding: 6px 16px; border-radius: 100px; backdrop-filter: blur(10px); text-align: center; }

.stage { flex: 1; position: relative; margin: 10px 20px; border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
#celebBg { position: absolute; inset: 0; background-size: cover; background-position: center 15%; transform: scale(1.1); transition: transform 2s ease-out; }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(8, 1fr); gap: 2px; width: 100%; height: 100%; position: relative; z-index: 1; }

.cell {
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(45px); -webkit-backdrop-filter: blur(45px);
  border: 0.5px solid rgba(255,255,255,0.03);
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Permanent States */
.cell.hinted { background: rgba(10, 10, 15, 0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.cell.shattered { background: transparent !important; backdrop-filter: blur(0px) !important; -webkit-backdrop-filter: blur(0px) !important; border: none !important; }

.cell.selected { border: 1.5px solid var(--gold-static) !important; background: rgba(255,255,255,0.1); }

.potion { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; animation: pop 0.25s ease-out; pointer-events: none; }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

.footer { padding: 20px 24px env(safe-area-inset-bottom, 20px); }
.input-wrapper { display: flex; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 4px; }
#guessInput { flex: 1; background: transparent; border: none; padding: 14px; color: #fff; font-family: 'Montserrat'; outline: none; }
.btn-reveal { background: var(--gold); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; }

#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
</style>
</head>
<body onclick="initAudio()">

<div id="overlay">
    <h1 class="studio-logo" style="font-size: 2rem;">GHAZAB!</h1>
    <p id="winMsg" style="margin: 20px; text-align:center;"></p>
    <button class="btn-reveal" onclick="location.reload()">Play Next</button>
</div>

<div class="header">
  <div class="studio-logo">Sparkle Studio</div>
  <div class="stat-pill">
    <div id="goalLabel" style="font-size: 0.5rem; color: var(--gold-static); font-weight: 900;">NEXT GOAL</div>
    <div id="goalText" style="font-size: 0.9rem; font-weight: 600;">Merge Level 2</div>
  </div>
</div>

<div class="stage">
  <div id="celebBg"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="footer">
  <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.6rem; font-weight:900; color:var(--gold-static);">
    <span id="progressText">REVEALED: 0%</span>
    <span>STREAK: <span id="streak">0</span></span>
  </div>
  <div class="input-wrapper">
    <input type="text" id="guessInput" placeholder="Guess the name..." autocomplete="off">
    <button class="btn-reveal" onclick="checkGuess()">Guess</button>
  </div>
</div>

<script>
const DB = [
    { name: "Shah Rukh Khan", img: "https://www.themoviedb.org/t/p/original/m99asfLpSrkXo33U3v89j682Yf0.jpg" },
    { name: "Virat Kohli", img: "https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_320/lsci/db/PICTURES/CMS/316500/316523.png" },
    { name: "Zendaya", img: "https://www.themoviedb.org/t/p/original/xr96V4v2vX7Zz9D7v6M5uXzF6pB.jpg" }
];
const ICONS = ['🌸', '✨', '💧', '🔥', '🔮', '💎', '🌙', '☀️', '🌈', '👑'];

let S = {
    cells: Array(40).fill(null),
    shattered: Array(40).fill(false),
    selected: null,
    revealedCount: 0,
    current: null
};

let audioCtx = null;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSfx(freq) {
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(t + 0.1);
}

function init() {
    S.current = DB[Math.floor(Math.random() * DB.length)];
    document.getElementById('celebBg').style.backgroundImage = `url(${S.current.img})`;
    const grid = document.getElementById('grid');
    for(let i=0; i<40; i++) {
        const div = document.createElement('div');
        div.className = 'cell';
        div.id = `c-${i}`;
        div.onclick = (e) => { e.stopPropagation(); tap(i); };
        grid.appendChild(div);
    }
    for(let i=0; i<6; i++) spawn();
}

function tap(i) {
    // 1. PROTECTION: If cell is already shattered, ignore taps for gameplay logic
    // but allow selecting an item on top of it if it exists.
    
    if (S.selected === null) {
        if (S.cells[i]) {
            S.selected = i;
            document.getElementById(`c-${i}`).classList.add('selected');
            playSfx(400);
        } else if (!S.shattered[i]) { 
            // Only allow placement if the cell isn't shattered (or modify to allow placement anywhere)
            S.cells[i] = 1;
            render(i);
            playSfx(300);
        }
    } else {
        const from = S.selected;
        document.getElementById(`c-${from}`).classList.remove('selected');
        S.selected = null;

        // 2. MULTI-TAP PROTECTION: If user taps the same cell twice, just deselect
        if (from === i) return;

        if (S.cells[i] === S.cells[from]) {
            // MERGE SUCCESS
            const newLv = S.cells[i] + 1;
            S.cells[i] = newLv;
            S.cells[from] = null;
            
            // Logic for reveal
            if (S.revealedCount < 6 || newLv >= getReq()) {
                shatter(i);
            } else {
                hint(i);
            }

            render(from); render(i);
            updateUI();
            setTimeout(spawn, 100);
        } else {
            // SWAP
            [S.cells[i], S.cells[from]] = [S.cells[from], S.cells[i]];
            render(from); render(i);
            playSfx(200);
        }
    }
}

function getReq() {
    if (S.revealedCount < 10) return 2;
    if (S.revealedCount < 20) return 3;
    return 4;
}

function shatter(idx) {
    // Permanent Shatter Logic
    if (!S.shattered[idx]) {
        S.shattered[idx] = true;
        S.revealedCount++;
    }
    
    // Splash neighbors
    [idx-1, idx+1, idx-5, idx+5].forEach(n => {
        if(n >= 0 && n < 40 && Math.random() > 0.7 && !S.shattered[n]) {
            S.shattered[n] = true;
            S.revealedCount++;
        }
    });
    
    playSfx(800);
    // Apply visual state to all shattered tiles
    for(let j=0; j<40; j++) if(S.shattered[j]) render(j);
}

function hint(idx) {
    if (!S.shattered[idx]) {
        document.getElementById(`c-${idx}`).classList.add('hinted');
    }
}

function render(i) {
    const cell = document.getElementById(`c-${i}`);
    const val = S.cells[i];
    cell.innerHTML = val ? `<div class="potion">${ICONS[val-1]}</div>` : '';
    
    // Ensure the shattered class is NEVER removed once added
    if (S.shattered[i]) {
        cell.classList.add('shattered');
        cell.classList.remove('hinted');
    }
}

function checkGuess() {
    const input = document.getElementById('guessInput');
    if (input.value.trim().toLowerCase() === S.current.name.toLowerCase()) {
        document.getElementById('winMsg').innerText = `Correct! It's ${S.current.name}`;
        document.getElementById('overlay').style.display = 'flex';
    } else {
        input.value = "";
        input.placeholder = "Try again!";
    }
}

function spawn() {
    const empty = S.cells.map((v, i) => v === null ? i : null).filter(v => v !== null);
    if (empty.length > 0) {
        const idx = empty[Math.floor(Math.random() * empty.length)];
        S.cells[idx] = 1; render(idx);
    }
}

function updateUI() {
    document.getElementById('goalText').innerText = `Merge Level ${getReq()}`;
    document.getElementById('progressText').innerText = `REVEALED: ${Math.floor((S.revealedCount/40)*100)}%`;
}

init();
</script>
</body>
</html>
