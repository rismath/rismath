<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sparkle Studio — Celebrity Reveal V3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#06040c;
      --bg2:#12081f;
      --bg3:#1a0d2b;
      --gold1:#bf953f;
      --gold2:#f5d78e;
      --gold3:#fcf6ba;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.62);
      --soft:rgba(255,255,255,0.12);
      --line:rgba(255,255,255,0.10);
      --danger:#e8547a;
      --success:#76d67e;
      --shadow:0 18px 60px rgba(0,0,0,0.45);
      --cell-gap:8px;
      --radius:18px;
      --header-h:78px;
      --footer-h:128px;
      --stage-max:560px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      height:100%;
      background:
        radial-gradient(circle at top, rgba(255,214,102,0.10), transparent 30%),
        linear-gradient(180deg, var(--bg3), var(--bg2) 35%, var(--bg1));
      color:var(--text);
      font-family:'Montserrat',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      overflow:hidden;
    }

    body{
      display:flex;
      flex-direction:column;
      min-height:100svh;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    button, input { font: inherit; }

    /* Loading */
    #loading{
      position:fixed;
      inset:0;
      z-index:300;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      background:
        radial-gradient(circle at center, rgba(255,220,130,0.10), transparent 30%),
        linear-gradient(135deg,#13081f,#09040f 65%, #020103);
    }
    .load-logo{
      font-family:'Marcellus', serif;
      font-size:1.9rem;
      letter-spacing:.05em;
      background:linear-gradient(135deg,var(--gold1),var(--gold3));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .load-bar-wrap{
      width:min(280px,78vw);
      height:10px;
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.05);
    }
    .load-bar{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(135deg,var(--gold1),var(--gold2),var(--gold3));
      transition:width .22s ease;
    }
    .load-sub{
      font-size:.82rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.58);
      font-weight:700;
    }

    /* Header */
    .header{
      height:var(--header-h);
      min-height:var(--header-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
      padding-top:max(12px, env(safe-area-inset-top));
      gap:12px;
      position:relative;
      z-index:2;
    }
    .logo{
      font-family:'Marcellus', serif;
      font-size:1.18rem;
      letter-spacing:.04em;
      background:linear-gradient(135deg,var(--gold1),var(--gold3));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      white-space:nowrap;
    }
    .hud{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .chip{
      padding:8px 10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.04);
      border-radius:14px;
      font-size:.68rem;
      font-weight:800;
      letter-spacing:.07em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.82);
      white-space:nowrap;
    }
    .chip.hot{
      border-color:rgba(255,220,120,0.35);
      box-shadow:0 0 18px rgba(255,220,120,0.08);
      background:linear-gradient(180deg, rgba(255,220,100,0.12), rgba(255,255,255,0.04));
    }

    .progress-wrap{
      position:relative;
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
    }
    .progress-text{
      position:absolute;
      font-size:.62rem;
      font-weight:900;
      color:#fff;
      letter-spacing:.02em;
    }
    .progress-ring{
      width:42px;
      height:42px;
      transform:rotate(-90deg);
    }
    .ring-bg{
      fill:none;
      stroke:rgba(255,255,255,0.12);
      stroke-width:3;
    }
    .ring-fill{
      fill:none;
      stroke:url(#ringGradient);
      stroke-width:3;
      stroke-linecap:round;
      stroke-dasharray:75.4;
      stroke-dashoffset:75.4;
      transition:stroke-dashoffset .28s ease;
      filter:drop-shadow(0 0 6px rgba(255,220,100,0.35));
    }

    /* Stage */
    .stage-shell{
      flex:1;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px 14px;
    }
    .stage{
      width:min(94vw, var(--stage-max));
      aspect-ratio:5 / 8;
      max-height:100%;
      position:relative;
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:var(--shadow);
      background:
        radial-gradient(circle at top, rgba(255,215,110,0.10), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00)),
        linear-gradient(180deg, #10061b, #06030b 75%);
    }

    #bgDim{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      filter:blur(16px) saturate(.95) brightness(.35);
      transform:scale(1.06);
      opacity:.88;
    }

    #bgDim::after{
      content:'';
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(5,3,9,0.35), rgba(5,3,9,0.52)),
        radial-gradient(circle at center, transparent 0 30%, rgba(5,3,9,0.35) 75%, rgba(5,3,9,0.6) 100%);
    }

    #revealCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      pointer-events:none;
    }

    .grid{
      position:absolute;
      inset:0;
      z-index:2;
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      grid-template-rows:repeat(8, 1fr);
      gap:var(--cell-gap);
      padding:14px;
    }

    .cell{
      position:relative;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03)),
        rgba(8,5,13,0.56);
      backdrop-filter:blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      overflow:hidden;
      cursor:pointer;
      transition:
        transform .14s ease,
        border-color .2s ease,
        background .2s ease,
        box-shadow .2s ease,
        opacity .2s ease;
    }
    .cell:active{ transform:scale(.97); }

    .cell.selected{
      transform:translateY(-1px) scale(1.02);
      border-color:rgba(255,230,150,0.6);
      box-shadow:
        0 0 0 1px rgba(255,220,100,0.15),
        0 10px 24px rgba(0,0,0,0.22),
        inset 0 0 18px rgba(255,220,100,0.08);
      background:
        linear-gradient(180deg, rgba(255,220,110,0.16), rgba(255,255,255,0.04)),
        rgba(12,8,19,0.72);
    }

    .cell.shattered{
      opacity:0;
      pointer-events:none;
      transform:scale(.92);
    }

    .cell.shattering{
      animation:shatterOut .28s ease forwards;
      pointer-events:none;
    }
    .cell.combo-hit{
      animation:comboPunch .24s ease;
    }
    @keyframes shatterOut{
      0%{ transform:scale(1) rotate(0deg); opacity:1; filter:blur(0px); }
      40%{ transform:scale(1.07) rotate(-2deg); opacity:1; }
      100%{ transform:scale(.72) rotate(6deg); opacity:0; filter:blur(6px); }
    }
    @keyframes comboPunch{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.08); }
      100%{ transform:scale(1); }
    }

    .tile-inner{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      z-index:1;
    }
    .tile-emoji{
      font-size:clamp(1rem, 2.4vw, 1.6rem);
      line-height:1;
      filter:drop-shadow(0 2px 6px rgba(0,0,0,0.25));
    }
    .tile-level{
      font-size:.56rem;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.85);
    }

    .merge-flash{
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:inherit;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.42), transparent 58%),
        linear-gradient(180deg, rgba(255,230,150,0.20), transparent);
      animation:mergeFlash .36s ease-out forwards;
      z-index:2;
    }
    .reveal-flash{
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:inherit;
      background:radial-gradient(circle, rgba(255,220,150,0.40), transparent 68%);
      animation:mergeFlash .55s ease-out forwards;
      z-index:3;
    }
    @keyframes mergeFlash{
      from{ opacity:1; transform:scale(1); }
      to{ opacity:0; transform:scale(1.08); }
    }

    .floating{
      position:fixed;
      z-index:999;
      pointer-events:none;
      font-weight:900;
      letter-spacing:.04em;
      text-shadow:0 0 12px rgba(255,220,100,0.35);
      animation:floatUp .8s ease-out forwards;
      white-space:nowrap;
    }
    @keyframes floatUp{
      0%{ opacity:1; transform:translate(-50%, 0) scale(.9); }
      100%{ opacity:0; transform:translate(-50%, -52px) scale(1.04); }
    }

    .spark{
      position:fixed;
      z-index:999;
      pointer-events:none;
      font-size:.8rem;
      animation:sparkFly .65s ease-out forwards;
      text-shadow:0 0 10px rgba(255,220,100,0.45);
    }
    @keyframes sparkFly{
      0%{ opacity:1; transform:translate(0,0) scale(1); }
      100%{ opacity:0; transform:translate(var(--tx), var(--ty)) scale(0.35); }
    }

    .img-placeholder{
      position:absolute;
      inset:0;
      z-index:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:10px;
      background:linear-gradient(135deg, rgba(30,10,50,0.35), rgba(5,2,9,0.45));
      color:rgba(255,255,255,0.3);
      text-align:center;
      padding:24px;
    }
    .img-placeholder-icon{ font-size:2.6rem; opacity:.34; }
    .img-placeholder-text{
      max-width:260px;
      font-size:.72rem;
      line-height:1.5;
      font-weight:700;
      letter-spacing:.10em;
      text-transform:uppercase;
    }

    /* Footer */
    .footer{
      min-height:var(--footer-h);
      padding:10px 16px max(12px, env(safe-area-inset-bottom));
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:8px;
      z-index:2;
    }
    .merge-hint{
      text-align:center;
      font-size:.64rem;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.34);
    }
    .subhint{
      text-align:center;
      font-size:.74rem;
      color:rgba(255,255,255,0.55);
      min-height:1.1em;
    }
    .input-row{
      display:flex;
      gap:8px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--line);
      border-radius:16px;
      padding:4px;
    }
    #guessInput{
      flex:1;
      min-width:0;
      background:transparent;
      border:none;
      outline:none;
      color:#fff;
      padding:13px 14px;
      font-size:.95rem;
    }
    #guessInput::placeholder{ color:rgba(255,255,255,0.28); }
    .btn-guess, .btn-reset, .btn-next{
      border:none;
      cursor:pointer;
      border-radius:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      transition:transform .16s ease, opacity .16s ease;
    }
    .btn-guess:active, .btn-reset:active, .btn-next:active{ transform:scale(.98); }

    .btn-guess{
      padding:0 18px;
      color:#000;
      background:linear-gradient(135deg,var(--gold1),var(--gold2),var(--gold3));
      white-space:nowrap;
    }

    /* Overlay */
    #overlay{
      position:fixed;
      inset:0;
      z-index:220;
      display:none;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:rgba(0,0,0,0.86);
      backdrop-filter:blur(18px);
    }
    .overlay-card{
      width:min(430px, 92vw);
      border-radius:26px;
      padding:26px 22px;
      border:1px solid rgba(255,255,255,0.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        linear-gradient(180deg, #12091f, #090510);
      box-shadow:var(--shadow);
      text-align:center;
    }
    .ov-icon{ font-size:3rem; margin-bottom:8px; }
    .ov-title{
      font-family:'Marcellus', serif;
      font-size:1.9rem;
      margin-bottom:8px;
      background:linear-gradient(135deg,var(--gold1),var(--gold3));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .ov-name{
      font-size:1.18rem;
      font-weight:900;
      margin-bottom:8px;
    }
    .ov-hint{
      font-size:.8rem;
      color:rgba(255,255,255,0.6);
      margin-bottom:8px;
    }
    .ov-reveal{
      font-size:.72rem;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.45);
      margin-bottom:18px;
      line-height:1.8;
    }
    .overlay-actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .btn-next{
      padding:12px 18px;
      color:#000;
      background:linear-gradient(135deg,var(--gold1),var(--gold2),var(--gold3));
    }
    .btn-reset{
      padding:12px 18px;
      color:#fff;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
    }

    @media (max-width: 420px){
      .header{ padding-inline:12px; }
      .grid{ padding:12px; gap:7px; }
      .tile-level{ font-size:.5rem; }
      .chip{ font-size:.62rem; padding:7px 8px; }
      .logo{ font-size:1.02rem; }
      .btn-guess{ padding:0 14px; }
    }
  </style>
</head>
<body>
  <div id="loading" aria-live="polite">
    <div class="load-logo">Sparkle Studio</div>
    <div class="load-bar-wrap" aria-hidden="true">
      <div class="load-bar" id="loadBar"></div>
    </div>
    <div class="load-sub" id="loadSub">Loading star…</div>
  </div>

  <div id="overlay" role="dialog" aria-modal="true" aria-labelledby="ovTitle">
    <div class="overlay-card">
      <div class="ov-icon">⭐</div>
      <div class="ov-title" id="ovTitle">You got it!</div>
      <div class="ov-name" id="ovName"></div>
      <div class="ov-hint" id="ovHint"></div>
      <div class="ov-reveal" id="ovReveal"></div>
      <div class="overlay-actions">
        <button class="btn-next" onclick="nextCeleb()">Next Star</button>
        <button class="btn-reset" onclick="restartSame()">Play Again</button>
      </div>
    </div>
  </div>

  <div class="header">
    <div class="logo">Sparkle Studio V3</div>
    <div class="hud">
      <div class="chip" id="scoreChip">Score: 0</div>
      <div class="chip" id="movesChip">Merges: 0</div>
      <div class="chip" id="streakChip">Streak: 0</div>
      <div class="chip" id="levelChip">Power: 1</div>
      <div class="progress-wrap" aria-label="Reveal progress">
        <div class="progress-text" id="progressText">0%</div>
        <svg class="progress-ring" viewBox="0 0 28 28" aria-hidden="true">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#bf953f"/>
              <stop offset="50%" stop-color="#f5d78e"/>
              <stop offset="100%" stop-color="#fcf6ba"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="14" cy="14" r="12"></circle>
          <circle class="ring-fill" id="ringFill" cx="14" cy="14" r="12"></circle>
        </svg>
      </div>
    </div>
  </div>

  <div class="stage-shell">
    <div class="stage" id="stage">
      <div id="bgDim"></div>
      <canvas id="revealCanvas"></canvas>
      <div class="grid" id="grid" aria-label="Game grid"></div>
      <div class="img-placeholder" id="imgPlaceholder" style="display:none">
        <div class="img-placeholder-icon">🌟</div>
        <div class="img-placeholder-text" id="placeholderText">
          Add celebrity image files to your images folder to reveal real photos.
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="merge-hint">Merge matching icons · build streaks · trigger combos · reveal the star</div>
    <div class="subhint" id="subhint">Tip: bigger merges help break tougher central tiles.</div>
    <div class="input-row">
      <input
        type="text"
        id="guessInput"
        placeholder="Who is this celebrity?"
        autocomplete="off"
        aria-label="Guess the celebrity"
      />
      <button class="btn-guess" id="guessBtn">Guess</button>
    </div>
  </div>

  <script>
    const DB = [
      { name: "Juhi Chawla",     img: "images/JuhiChawla.png",      hint: "Bollywood actress" },
      { name: "Shubman Gill",    img: "images/ShubmanGill.png",     hint: "Indian cricketer" },
      { name: "Shah Rukh Khan",  img: "images/ShahRukhKhan.png",    hint: "Bollywood superstar" },
      { name: "Rahul Gandhi",    img: "images/RahulGandhi.png",     hint: "Indian politician" },
      { name: "Smriti Mandhana", img: "images/SmritiMandhana.png",  hint: "Indian cricketer" }
    ];

    const ROWS = 8;
    const COLS = 5;
    const TOTAL = ROWS * COLS;
    const CIRCUMFERENCE = 2 * Math.PI * 12;

    const TILE_SET = [
      { emoji: "✨", name: "spark" },
      { emoji: "💎", name: "gem" },
      { emoji: "🌟", name: "star" },
      { emoji: "🔥", name: "flare" },
      { emoji: "👑", name: "crown" },
      { emoji: "☀️", name: "sun" },
      { emoji: "🪄", name: "magic" },
      { emoji: "🌈", name: "aurora" },
      { emoji: "⚡", name: "thunder" },
      { emoji: "💫", name: "nova" },
      { emoji: "🦄", name: "mythic" },
      { emoji: "🌌", name: "cosmic" }
    ];

    let S = null;
    let audioCtx = null;
    let actionLocked = false;

    function el(id){ return document.getElementById(id); }

    function initAudio(){
      if(!audioCtx){
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
      }
    }

    function sfx(freq = 440, duration = 0.08, type = 'sine', gainValue = 0.03){
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(gainValue, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }

    function playMerge(level, streak){
      sfx(260 + level * 45 + streak * 10, 0.1, 'triangle', 0.035);
      setTimeout(() => sfx(390 + level * 24, 0.06, 'sine', 0.022), 40);
    }

    function playCombo(){
      sfx(620, 0.09, 'triangle', 0.03);
      setTimeout(() => sfx(780, 0.11, 'triangle', 0.026), 60);
    }

    function playShatter(){
      sfx(180, 0.08, 'sawtooth', 0.02);
      setTimeout(() => sfx(90, 0.16, 'triangle', 0.025), 40);
    }

    function playWrong(){
      sfx(180, 0.09, 'square', 0.02);
      setTimeout(() => sfx(140, 0.12, 'square', 0.016), 50);
    }

    function playWin(){
      sfx(520, 0.12, 'triangle', 0.03);
      setTimeout(() => sfx(660, 0.15, 'triangle', 0.03), 70);
      setTimeout(() => sfx(880, 0.18, 'triangle', 0.03), 150);
    }

    function normalizeName(str){
      return str
        .toLowerCase()
        .normalize('NFKD')
        .replace(/[^\w\s]/g, ' ')
        .replace(/_/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function acceptedGuessesFor(name){
      const normalized = normalizeName(name);
      const parts = normalized.split(' ');
      const combos = new Set([normalized]);

      if (parts.length >= 2) {
        combos.add(parts[0]);
        combos.add(parts[parts.length - 1]);
        combos.add(parts.slice(0, 2).join(' '));
      }

      if (normalized === 'shah rukh khan') {
        combos.add('shahrukh khan');
        combos.add('srk');
        combos.add('shah rukh');
        combos.add('shahrukh');
      }
      if (normalized === 'rahul gandhi') combos.add('rahul');
      if (normalized === 'smriti mandhana') combos.add('smriti');
      if (normalized === 'juhi chawla') combos.add('juhi');
      if (normalized === 'shubman gill') {
        combos.add('shubhman gill');
        combos.add('shubham gill');
        combos.add('shubman');
        combos.add('gill');
      }

      return combos;
    }

    function tileForLevel(level){
      return TILE_SET[(Math.max(1, level) - 1) % TILE_SET.length];
    }

    function getNeighbors(idx){
      const row = Math.floor(idx / COLS);
      const col = idx % COLS;
      const out = [];
      if (col > 0) out.push(idx - 1);
      if (col < COLS - 1) out.push(idx + 1);
      if (row > 0) out.push(idx - COLS);
      if (row < ROWS - 1) out.push(idx + COLS);
      return out;
    }

    function manhattanToCenter(idx){
      const row = Math.floor(idx / COLS);
      const col = idx % COLS;
      const cr = (ROWS - 1) / 2;
      const cc = (COLS - 1) / 2;
      return Math.abs(row - cr) + Math.abs(col - cc);
    }

    function randomEmptyCell(weighted = false){
      const options = [];
      for(let i = 0; i < TOTAL; i++){
        if (!S.shattered[i] && S.cells[i] === null) {
          options.push(i);
        }
      }
      if (!options.length) return -1;
      if (!weighted) return options[Math.floor(Math.random() * options.length)];

      const weightedBag = [];
      for (const i of options){
        const dist = manhattanToCenter(i);
        const weight = Math.max(1, Math.round(6 - dist));
        for(let k = 0; k < weight; k++) weightedBag.push(i);
      }
      return weightedBag[Math.floor(Math.random() * weightedBag.length)];
    }

    function cellStrengthRequirement(i){
      const dist = manhattanToCenter(i);
      if (dist <= 1.5) return Math.floor(Math.random() * 3) + 8;  // 8-10
      if (dist <= 2.5) return Math.floor(Math.random() * 4) + 6;  // 6-9
      return Math.floor(Math.random() * 4) + 3;                   // 3-6
    }

    function updateDifficulty(){
      const pct = S.revealed / TOTAL;
      if (pct >= 0.75) S.spawnBias = 0.58;
      else if (pct >= 0.50) S.spawnBias = 0.66;
      else if (pct >= 0.25) S.spawnBias = 0.76;
      else S.spawnBias = 0.86;
    }

    function buildGrid(){
      const grid = el('grid');
      grid.innerHTML = '';
      for(let i = 0; i < TOTAL; i++){
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.id = `c-${i}`;
        cell.type = 'button';
        cell.setAttribute('aria-label', `Tile ${i + 1}`);
        cell.addEventListener('click', () => onCellTap(i));
        grid.appendChild(cell);
      }
    }

    function loadImg(src, cb){
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => cb(img);
      img.onerror = () => cb(null);
      img.src = src;
    }

    function setupCanvas(){
      const canvas = el('revealCanvas');
      const stage = el('stage');
      const rect = stage.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, rect.width, rect.height);
    }

    function revealCell(idx){
      const canvas = el('revealCanvas');
      const stage = el('stage');
      const ctx = canvas.getContext('2d');
      const rect = stage.getBoundingClientRect();

      const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell-gap')) || 8;
      const pad = 14;
      const cellW = (rect.width - pad * 2 - gap * (COLS - 1)) / COLS;
      const cellH = (rect.height - pad * 2 - gap * (ROWS - 1)) / ROWS;
      const row = Math.floor(idx / COLS);
      const col = idx % COLS;
      const x = pad + col * (cellW + gap);
      const y = pad + row * (cellH + gap);

      if (S.imgLoaded && S.img) {
        ctx.drawImage(
          S.img,
          (x / rect.width) * S.img.width,
          (y / rect.height) * S.img.height,
          (cellW / rect.width) * S.img.width,
          (cellH / rect.height) * S.img.height,
          x, y, cellW + 1, cellH + 1
        );
        ctx.fillStyle = 'rgba(255,220,100,0.05)';
        ctx.fillRect(x, y, cellW + 1, cellH + 1);
      } else {
        const grad = ctx.createRadialGradient(
          x + cellW / 2, y + cellH / 2, 0,
          x + cellW / 2, y + cellH / 2, cellW
        );
        grad.addColorStop(0, `hsl(${(idx * 19) % 360}, 68%, 56%)`);
        grad.addColorStop(1, `hsl(${(idx * 19 + 40) % 360}, 42%, 28%)`);
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, cellW + 1, cellH + 1);
      }

      ctx.strokeStyle = 'rgba(255,220,100,0.08)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x + 0.5, y + 0.5, cellW, cellH);
    }

    function redrawRevealedCells(){
      setupCanvas();
      for(let i = 0; i < TOTAL; i++){
        if (S.shattered[i]) revealCell(i);
      }
    }

    function renderCell(i){
      const cell = el(`c-${i}`);
      if (!cell) return;

      if (S.shattered[i]) {
        cell.className = 'cell shattered';
        cell.innerHTML = '';
        return;
      }

      const level = S.cells[i];
      cell.className = 'cell';
      if (S.selected === i) cell.classList.add('selected');

      if (level === null) {
        cell.innerHTML = '';
        cell.setAttribute('aria-label', `Empty tile ${i + 1}`);
        return;
      }

      const tile = tileForLevel(level);
      cell.innerHTML = `
        <div class="tile-inner">
          <div class="tile-emoji">${tile.emoji}</div>
          <div class="tile-level">Lv ${level}</div>
        </div>
      `;
      cell.setAttribute('aria-label', `Level ${level} tile`);
    }

    function renderAll(){
      for(let i = 0; i < TOTAL; i++) renderCell(i);
      updateProgress();
      updateHud();
    }

    function updateProgress(){
      const pct = Math.round((S.revealed / TOTAL) * 100);
      el('progressText').textContent = pct + '%';
      el('ringFill').style.strokeDasharray = CIRCUMFERENCE;
      el('ringFill').style.strokeDashoffset = CIRCUMFERENCE * (1 - pct / 100);
    }

    function updateHud(){
      el('scoreChip').textContent = `Score: ${S.score}`;
      el('movesChip').textContent = `Merges: ${S.merges}`;
      el('streakChip').textContent = `Streak: ${S.streak}`;
      el('levelChip').textContent = `Power: ${S.maxLevel}`;

      el('streakChip').classList.toggle('hot', S.streak >= 3);
      el('levelChip').classList.toggle('hot', S.maxLevel >= 6);

      const pct = Math.round((S.revealed / TOTAL) * 100);
      el('subhint').textContent =
        `Hint: ${S.current.hint} · Revealed ${pct}% · Combo chain ${S.comboChain}`;
    }

    function showFloatingText(text, x, y, size = '1rem'){
      const node = document.createElement('div');
      node.className = 'floating';
      node.textContent = text;
      node.style.left = `${x}px`;
      node.style.top = `${y}px`;
      node.style.fontSize = size;
      document.body.appendChild(node);
      setTimeout(() => node.remove(), 820);
    }

    function spawnParticles(targetEl){
      const r = targetEl.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const glyphs = ['✦','✧','·','⭐','✸','✨'];

      for(let i = 0; i < 8; i++){
        const sp = document.createElement('div');
        sp.className = 'spark';
        sp.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
        sp.style.left = `${cx}px`;
        sp.style.top = `${cy}px`;
        sp.style.setProperty('--tx', `${(Math.random() - 0.5) * 120}px`);
        sp.style.setProperty('--ty', `${(Math.random() - 0.5) * 120}px`);
        document.body.appendChild(sp);
        setTimeout(() => sp.remove(), 650);
      }
    }

    function setSelected(idx){
      document.querySelectorAll('.cell.selected').forEach(node => node.classList.remove('selected'));
      S.selected = idx;
      if (idx !== null) el(`c-${idx}`)?.classList.add('selected');
    }

    function resetStreak(){
      S.streak = 0;
      S.comboChain = 0;
      updateHud();
    }

    function spawn(count = 1){
      updateDifficulty();

      for(let k = 0; k < count; k++){
        const idx = randomEmptyCell(true);
        if (idx === -1) return;

        let newLevel = 1;
        const nearHighTile = getNeighbors(idx).some(n => (S.cells[n] || 0) >= 3);
        const rand = Math.random();

        if (S.maxLevel >= 7 && rand > 0.96) newLevel = 4;
        else if (S.maxLevel >= 5 && rand > 0.90) newLevel = 3;
        else if (nearHighTile && rand > S.spawnBias) newLevel = 2;
        else newLevel = 1;

        S.cells[idx] = newLevel;
        renderCell(idx);
      }
    }

    function scoreMerge(level){
      const base = level * 12;
      const streakBonus = S.streak * 5;
      const comboBonus = S.comboChain * 10;
      const total = base + streakBonus + comboBonus;
      S.score += total;
      return total;
    }

    function scoreReveal(count){
      const points = count * 50 + (count > 1 ? count * 20 : 0);
      S.score += points;
      return points;
    }

    function shatterCell(idx){
      if (S.shattered[idx]) return false;
      S.shattered[idx] = true;
      S.cells[idx] = null;
      S.revealed++;
      revealCell(idx);

      const node = el(`c-${idx}`);
      if (node) {
        node.className = 'cell shattered';
        node.innerHTML = '';
      }
      return true;
    }

    function triggerComboVisual(cells){
      cells.forEach(i => {
        const node = el(`c-${i}`);
        if (!node) return;
        node.classList.add('combo-hit');
        setTimeout(() => node.classList.remove('combo-hit'), 260);
      });
    }

    function checkCascadeFrom(idx){
      const neighbors = getNeighbors(idx);
      const sameLevel = neighbors.filter(n => !S.shattered[n] && S.cells[n] !== null && S.cells[n] === S.cells[idx]);
      return sameLevel.length >= 2;
    }

    async function doShatter(idx, causeLevel = 1){
      if (S.shattered[idx]) return;
      actionLocked = true;

      const target = el(`c-${idx}`);
      if (target) target.classList.add('shattering');

      await wait(220);

      let shatteredNow = [];
      if (shatterCell(idx)) shatteredNow.push(idx);

      const neighbors = getNeighbors(idx);
      const extraChance = Math.min(0.78, 0.35 + causeLevel * 0.05 + S.streak * 0.03);

      for (const n of neighbors){
        if (!S.shattered[n] && Math.random() < extraChance) {
          const neighborNode = el(`c-${n}`);
          if (neighborNode) neighborNode.classList.add('shattering');
          await wait(40);
          if (shatterCell(n)) shatteredNow.push(n);
        }
      }

      if (shatteredNow.length){
        const points = scoreReveal(shatteredNow.length);
        if (target){
          const r = target.getBoundingClientRect();
          showFloatingText(`+${points}`, r.left + r.width / 2, r.top + r.height / 2, '1rem');
        }
      }

      if (shatteredNow.length >= 3) {
        S.comboChain++;
        playCombo();
        triggerComboVisual(shatteredNow);
      } else {
        S.comboChain = Math.max(0, S.comboChain - 1);
      }

      spawnParticles(target || el(`c-${idx}`));
      playShatter();

      updateDifficulty();
      updateProgress();
      updateHud();
      checkWin();

      await wait(180);

      const spawnCount = shatteredNow.length >= 3 ? 2 : 1;
      spawn(spawnCount);

      updateHud();
      actionLocked = false;
    }

    function wait(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function onCellTap(i){
      if (!S || actionLocked || S.shattered[i]) return;
      initAudio();

      if (S.cells[i] === null) {
        if (S.selected !== null) {
          const from = S.selected;
          if (from === i) return;

          S.cells[i] = S.cells[from];
          S.cells[from] = null;
          setSelected(null);
          renderCell(from);
          renderCell(i);
          sfx(340, 0.06, 'triangle', 0.02);
          resetStreak();
          return;
        }

        if (Math.random() < 0.25) {
          S.cells[i] = 1;
          renderCell(i);
          sfx(300, 0.06, 'sine', 0.02);
        }
        return;
      }

      if (S.selected === null) {
        setSelected(i);
        sfx(460, 0.06, 'triangle', 0.02);
        return;
      }

      if (S.selected === i) {
        setSelected(null);
        return;
      }

      const from = S.selected;
      setSelected(null);

      if (S.cells[i] === S.cells[from]) {
        actionLocked = true;

        const newLevel = S.cells[from] + 1;
        S.cells[from] = null;
        S.cells[i] = newLevel;
        S.merges++;
        S.streak++;
        S.maxLevel = Math.max(S.maxLevel, newLevel);

        const gained = scoreMerge(newLevel);
        renderCell(from);
        renderCell(i);

        const target = el(`c-${i}`);
        if (target) {
          const flash = document.createElement('div');
          flash.className = 'merge-flash';
          target.appendChild(flash);
          setTimeout(() => flash.remove(), 380);

          const r = target.getBoundingClientRect();
          showFloatingText(`+${gained}`, r.left + r.width / 2, r.top + r.height / 2, '.95rem');
        }

        playMerge(newLevel, S.streak);
        updateHud();

        await wait(180);

        if (newLevel >= S.shatterLevel[i]) {
          await doShatter(i, newLevel);
        } else if (checkCascadeFrom(i) && newLevel >= Math.max(3, S.shatterLevel[i] - 2)) {
          S.comboChain++;
          await doShatter(i, newLevel);
        } else {
          spawn(1);
          actionLocked = false;
        }

        renderCell(i);
        updateHud();
      } else {
        [S.cells[i], S.cells[from]] = [S.cells[from], S.cells[i]];
        renderCell(from);
        renderCell(i);
        sfx(350, 0.05, 'sine', 0.018);
        resetStreak();
      }
    }

    function checkGuess(){
      const raw = el('guessInput').value.trim();
      if (!raw || !S) return;

      initAudio();
      S.guesses++;

      const guess = normalizeName(raw);
      const accepted = acceptedGuessesFor(S.current.name);

      let matched = accepted.has(guess);
      if (!matched) {
        for (const opt of accepted) {
          if (opt.length >= 5 && (opt.includes(guess) || guess.includes(opt))) {
            matched = true;
            break;
          }
        }
      }

      if (matched) {
        S.score += 250 + Math.max(0, 100 - S.guesses * 20);
        showWin(true);
      } else {
        playWrong();
        el('guessInput').value = '';
        el('guessInput').placeholder = 'Try again…';
        const row = document.querySelector('.input-row');
        row.style.borderColor = 'rgba(232,84,122,0.72)';
        row.style.boxShadow = '0 0 0 1px rgba(232,84,122,0.12)';
        setTimeout(() => {
          row.style.borderColor = '';
          row.style.boxShadow = '';
        }, 700);
      }
      updateHud();
    }

    function checkWin(){
      if (S.revealed >= TOTAL) showWin(false);
    }

    function showWin(byGuess){
      if (S.finished) return;
      S.finished = true;
      playWin();

      let autoRevealBonus = 0;

      for(let i = 0; i < TOTAL; i++){
        if (!S.shattered[i]) {
          S.shattered[i] = true;
          S.cells[i] = null;
          S.revealed++;
          revealCell(i);
          autoRevealBonus += 20;
          const node = el(`c-${i}`);
          if (node) {
            node.className = 'cell shattered';
            node.innerHTML = '';
          }
        }
      }

      S.score += autoRevealBonus;
      updateProgress();
      updateHud();

      el('ovTitle').textContent = byGuess ? 'You got it!' : 'Fully revealed!';
      el('ovName').textContent = S.current.name;
      el('ovHint').textContent = S.current.hint ? `Hint: ${S.current.hint}` : '';
      el('ovReveal').innerHTML =
        `score ${S.score}<br>` +
        `${S.revealed} tiles revealed · ${S.merges} merges<br>` +
        `best power ${S.maxLevel} · streak ${S.streak} · guesses ${S.guesses}`;
      el('overlay').style.display = 'flex';
    }

    function updateShatterLevels(){
      for(let i = 0; i < TOTAL; i++){
        S.shatterLevel[i] = cellStrengthRequirement(i);
      }
    }

    function finishInit(){
      buildGrid();
      setupCanvas();
      updateShatterLevels();
      spawn(7);
      renderAll();
      el('guessInput').value = '';
      el('guessInput').placeholder = 'Who is this celebrity?';
    }

    function init(celebIdx){
      const pick = celebIdx !== undefined
        ? DB[celebIdx % DB.length]
        : DB[Math.floor(Math.random() * DB.length)];

      S = {
        celebIdx: celebIdx ?? DB.indexOf(pick),
        current: pick,
        img: null,
        imgLoaded: false,
        cells: Array(TOTAL).fill(null),
        shattered: Array(TOTAL).fill(false),
        shatterLevel: Array(TOTAL).fill(0),
        selected: null,
        revealed: 0,
        guesses: 0,
        merges: 0,
        streak: 0,
        comboChain: 0,
        maxLevel: 1,
        score: 0,
        spawnBias: 0.86,
        finished: false
      };

      loadImg(pick.img, (img) => {
        S.img = img;
        S.imgLoaded = !!img;

        el('bgDim').style.backgroundImage = img
          ? `url(${pick.img})`
          : 'linear-gradient(135deg,#2d004c,#090010)';

        el('imgPlaceholder').style.display = img ? 'none' : 'flex';
        el('placeholderText').textContent = img
          ? ''
          : `Add ${pick.img} to your images folder to reveal the real photo.`;

        finishInit();
      });
    }

    function nextCeleb(){
      const next = (S.celebIdx + 1) % DB.length;
      el('overlay').style.display = 'none';
      showLoading(() => init(next));
    }

    function restartSame(){
      const same = S.celebIdx;
      el('overlay').style.display = 'none';
      showLoading(() => init(same));
    }

    function showLoading(cb){
      const screen = el('loading');
      const bar = el('loadBar');
      const sub = el('loadSub');
      screen.style.display = 'flex';
      bar.style.width = '0%';
      sub.textContent = 'Loading star…';

      let p = 0;
      const timer = setInterval(() => {
        p += Math.random() * 18 + 10;
        if (p >= 94) {
          p = 94;
          clearInterval(timer);
        }
        bar.style.width = p + '%';
      }, 90);

      setTimeout(() => {
        bar.style.width = '100%';
        clearInterval(timer);
        setTimeout(() => {
          screen.style.display = 'none';
          if (cb) cb();
        }, 180);
      }, 620);
    }

    window.addEventListener('resize', () => {
      if (!S) return;
      redrawRevealedCells();
    });

    el('guessBtn').addEventListener('click', checkGuess);
    el('guessInput').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') checkGuess();
    });

    showLoading(() => init(0));
  </script>
</body>
