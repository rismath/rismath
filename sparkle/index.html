<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sparkle &#x2014; The Grand Study</title>
<meta name="theme-color" content="#FFF0F5">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF0F5;--white:#FFFFFF;--red:#9A0020;--pink:#E8547A;--text:#1A0008;--muted:#6B0020;--border:rgba(154,0,32,0.2);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{height:100%;}
body{background:var(--bg);font-family:'Nunito',sans-serif;width:100%;max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;overflow:hidden;}
#root{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;text-align:center;}
.logo-icon{font-size:2.8rem;margin-bottom:0.8rem;animation:float 3.5s ease-in-out infinite;}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:600;color:var(--text);letter-spacing:0.06em;margin-bottom:0.2rem;}
.logo-title b{color:var(--red);}
.logo-sub{font-size:0.72rem;font-weight:800;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:2rem;}
.field-label{font-size:0.68rem;font-weight:800;color:var(--red);letter-spacing:0.12em;text-transform:uppercase;display:block;text-align:left;width:100%;margin-bottom:0.4rem;}
.field-input{width:100%;background:var(--white);border:2.5px solid var(--red);border-radius:0.8rem;padding:0.85rem 1rem;font-size:1.05rem;font-weight:700;color:var(--text);outline:none;margin-bottom:1.2rem;text-align:center;font-family:'Nunito',sans-serif;}
.intro-note{font-size:0.68rem;color:var(--muted);margin-bottom:1.2rem;line-height:1.6;}
.btn-main{width:100%;background:var(--red);color:white;border:none;border-radius:0.8rem;padding:0.95rem;font-size:1.05rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.game{flex:1;display:flex;flex-direction:column;min-height:0;}
.topbar{background:var(--white);border-bottom:2px solid var(--border);padding:0.35rem 0.7rem;display:flex;align-items:center;gap:0.5rem;flex-shrink:0;}
.back-btn{background:var(--bg);border:2px solid var(--border);border-radius:0.5rem;padding:0.22rem 0.5rem;font-size:0.75rem;font-weight:800;color:var(--text);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.breadcrumb{flex:1;font-size:0.58rem;font-weight:700;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hint-btn{background:transparent;border:2px solid var(--border);border-radius:0.5rem;padding:0.22rem 0.5rem;font-size:0.68rem;font-weight:800;color:var(--muted);cursor:pointer;flex-shrink:0;}
/* Chipbar — always visible, horizontal scroll */
.chipbar{background:var(--white);border-bottom:2px solid var(--border);padding:0.32rem 0.6rem;display:flex;gap:0.28rem;overflow-x:auto;flex-shrink:0;touch-action:pan-x;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chipbar::-webkit-scrollbar{display:none;}
.chip{border:1.5px solid var(--red);border-radius:2rem;padding:0.16rem 0.44rem;font-size:0.68rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:0.2rem;white-space:nowrap;flex-shrink:0;background:var(--white);}
.chip.found{border-color:var(--pink);color:var(--pink);text-decoration:line-through;opacity:0.5;background:#FFF5F8;}
.chip-dot{width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0;}
.chip.found .chip-dot{background:var(--pink);}
.progbar{height:3px;background:rgba(154,0,32,0.1);flex-shrink:0;}
.progfill{height:100%;background:var(--red);transition:width 0.5s ease;}
.viewport{flex:1;position:relative;overflow:hidden;background:#1A0808;cursor:crosshair;min-height:0;}
.scene-layer{position:absolute;inset:0;transform-origin:0 0;will-change:transform;}
.scene-layer.anim{transition:transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.35s;}
.scene-layer svg{width:100%;height:100%;display:block;position:absolute;inset:0;}
.depth-badge{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.55);color:white;font-size:0.62rem;font-weight:800;letter-spacing:0.06em;padding:0.28rem 0.7rem;border-radius:2rem;pointer-events:all;cursor:pointer;text-transform:uppercase;user-select:none;}
.complete{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;text-align:center;background:var(--bg);}
.complete-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;color:var(--text);margin-bottom:0.3rem;}
.complete-sub{font-size:0.72rem;font-weight:800;color:var(--red);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1.5rem;}
.complete-stars{font-size:2rem;color:var(--red);letter-spacing:0.3rem;margin-bottom:2rem;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes sparkle{0%{opacity:1;transform:translate(0,0)scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy))scale(0)}}
@keyframes petal{0%{opacity:0;transform:translateY(-20px)rotate(0deg)}15%{opacity:1}100%{opacity:0;transform:translateY(110vh)rotate(360deg)}}
.sp{position:fixed;pointer-events:none;z-index:1000;font-size:1rem;animation:sparkle 0.9s ease-out forwards;}
.pt{position:fixed;pointer-events:none;z-index:999;animation:petal linear forwards;}
</style>
</head>

<div id="root"></div>

// ── AUDIO ──────────────────────────────────────────────────────────────────
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function playFound(){try{const c=getAC(),t=c.currentTime;[[523,0],[659,0.1],[784,0.22]].forEach(([f,d])=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(0.09,t+d+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+d+0.5);o.connect(g);g.connect(c.destination);o.start(t+d);o.stop(t+d+0.5);});}catch(e){}}
function playComplete(){try{const c=getAC(),t=c.currentTime;[392,523,659,784,1046].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.1);g.gain.linearRampToValueAtTime(0.08,t+i*0.1+0.08);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+1.2);o.connect(g);g.connect(c.destination);o.start(t+i*0.1);o.stop(t+i*0.1+1.2);});}catch(e){}}
function playZoom(){try{const c=getAC(),t=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(560,t+0.28);g.gain.setValueAtTime(0.05,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.32);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.32);}catch(e){}}
document.addEventListener('touchstart',()=>{try{getAC();}catch(e){}},{once:true});

function sparkles(x,y){
  ['\u2736','\u2737','\u00B7','\u2764','\u22C6'].forEach((ch,i)=>{
    const el=document.createElement('div');el.className='sp';
    const ang=(i/5)*Math.PI*2,d=40+Math.random()*30;
    el.style.cssText=`left:${x}px;top:${y}px;color:${['#9A0020','#E8547A','#6A0010','#FF5070','#B02040'][i]};--dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d-22}px;`;
    el.textContent=ch;document.body.appendChild(el);setTimeout(()=>el.remove(),920);
  });
}
function petalRain(){
  for(let i=0;i<12;i++)setTimeout(()=>{
    const el=document.createElement('div');el.className='pt';
    el.textContent=['🌸','🌺','🌷','❤️'][i%4];
    const dur=2+Math.random()*2;
    el.style.cssText=`left:${Math.random()*100}vw;top:-30px;animation-duration:${dur}s;font-size:${0.9+Math.random()*0.5}rem;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),dur*1000+300);
  },i*130);
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(G.screen==='welcome')root.innerHTML=renderWelcome();
  else if(G.screen==='game'){root.innerHTML=renderGame();initGame();}
  else if(G.screen==='complete'){root.innerHTML=renderComplete();petalRain();}
}

function renderWelcome(){return`
<div class="welcome">
  <div class="logo-icon">✨</div>
  <div class="logo-title">Spar<b>k</b>le</div>
  <div class="logo-sub">The Hidden Study</div>
  <label class="field-label">Your name</label>
  <input class="field-input" id="ni" type="text" maxlength="20" placeholder="Enter your name…" value="${G.name}" onkeydown="if(event.key==='Enter')startGame()"/>
  <div class="intro-note">Find all 12 hidden objects across<br>the study and its nested worlds.<br><b>Pinch or double-tap to zoom in.</b></div>
  <button class="btn-main" onclick="startGame()">Begin exploring ✶</button>
</div>`;}

function renderGame(){
  const view=curView();
  const bc=G.viewStack.map(id=>VIEWS[id].label).join(' › ');
  const pct=Math.round((G.found.length/ALL_OBJECTS.length)*100);
  return`
<div class="game">
  <div class="topbar">
    <a href="https://rismath.com" class="back-btn" style="text-decoration:none;">🏠</a>
    ${G.viewStack.length>1?`<button class="back-btn" onclick="crossfadeBack()">← Back</button>`:''}
    <div class="breadcrumb">${bc}</div>
    <button class="hint-btn" onclick="showHint()">Hint</button>
  </div>
  <div class="chipbar">
    ${ALL_OBJECTS.map(o=>`<div class="chip${G.found.includes(o.id)?' found':''}"><div class="chip-dot"></div>${o.icon} ${o.label}</div>`).join('')}
  </div>
  <div class="progbar"><div class="progfill" style="width:${pct}%"></div></div>
  <div class="viewport" id="vp">
    <div class="scene-layer" id="sl">${view.svg}</div>
    <div class="depth-badge" onclick="toggleChips()">${G.found.length}/${ALL_OBJECTS.length} ✦</div>
  </div>
</div>`;}

function renderComplete(){return`
<div class="complete">
  <div style="font-size:3rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite">✨</div>
  <div class="complete-title">Study Complete</div>
  <div class="complete-sub">All 12 objects found · ${G.name}</div>
  <div class="complete-stars">✶ ✶ ✶ ✶ ✶</div>
  <button class="btn-main" onclick="resetGame()">Explore again</button>
</div>`;}

// ── GAME INIT ──────────────────────────────────────────────────────────────
function initGame(){
  injectTapTargets();
  injectHotspots();
  initPanZoom();
}

function injectTapTargets(){
  const svg=document.querySelector('#sl svg');
  if(!svg)return;
  svg.querySelectorAll('.tt').forEach(t=>t.remove());
  curView().objects.forEach(obj=>{
    if(G.found.includes(obj.id))return;
    const vx=(obj.cx/100)*960, vy=(obj.cy/100)*800;
    const r=Math.max(obj.r||30,30);
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',vx);c.setAttribute('cy',vy);c.setAttribute('r',r);
    c.setAttribute('fill','transparent');c.setAttribute('class','tt');
    c.dataset.id=obj.id;c.style.cursor='pointer';
    c.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();foundObj(obj,vx,vy,svg);});
    c.addEventListener('touchstart',e=>{e.stopPropagation();},{passive:true});
    c.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();foundObj(obj,vx,vy,svg);},{passive:false});
    svg.appendChild(c);
  });
}

// Tap areas on the SVG that navigate into child views
function injectHotspots(){
  const svg=document.querySelector('#sl svg');
  if(!svg)return;
  svg.querySelectorAll('.hs').forEach(h=>h.remove());
  (curView().hotspots||[]).forEach(hs=>{
    const rx=hs.x/100*960, ry=hs.y/100*800;
    const rw=hs.w/100*960, rh=hs.h/100*800;
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',rx);rect.setAttribute('y',ry);
    rect.setAttribute('width',rw);rect.setAttribute('height',rh);
    rect.setAttribute('fill','transparent');rect.setAttribute('class','hs');
    rect.style.cursor='zoom-in';
    rect.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();crossfadeTo(hs.to);});
    rect.addEventListener('touchstart',e=>{e.stopPropagation();},{passive:true});
    rect.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();if(!transitioning)crossfadeTo(hs.to);},{passive:false});
    svg.appendChild(rect);
  });
}

// ── NAVIGATE ───────────────────────────────────────────────────────────────
let transitioning=false;

function crossfadeTo(viewId){
  if(transitioning)return;
  transitioning=true;
  const sl=document.getElementById('sl');
  const done=()=>{G.viewStack.push(viewId);panX=0;panY=0;curScale=1;render();transitioning=false;};
  if(!sl){done();return;}
  sl.style.transition='opacity 0.28s ease';
  sl.style.opacity='0';
  setTimeout(done,280);
}

function crossfadeBack(){
  if(transitioning||G.viewStack.length<=1)return;
  transitioning=true;
  const sl=document.getElementById('sl');
  const done=()=>{G.viewStack.pop();panX=0;panY=0;curScale=1;render();transitioning=false;};
  if(!sl){done();return;}
  sl.style.transition='opacity 0.28s ease';
  sl.style.opacity='0';
  setTimeout(done,280);
}

// ── PAN & ZOOM ──────────────────────────────────────────────────────────────
// Tap hotspot rects in SVG → enter child view
// Pinch past scale 1 (i.e. wider than start) → go back to parent
// Double-tap → zoom 3× centred on tap / zoom back to 1×

function clampPan(){
  const vp=document.getElementById('vp');
  if(!vp||curScale<=1)return;
  const W=vp.offsetWidth, H=vp.offsetHeight;
  panX=Math.max(W-W*curScale, Math.min(0, panX));
  panY=Math.max(H-H*curScale, Math.min(0, panY));
}

function applyTransform(){
  const sl=document.getElementById('sl');
  if(!sl)return;
  if(curScale<=1){curScale=1;panX=0;panY=0;}
  else clampPan();
  sl.style.transition='none';
  sl.style.transform=curScale===1?'none':`translate(${panX}px,${panY}px) scale(${curScale})`;
  sl.style.transformOrigin='0 0';
}

function initPanZoom(){
  const vp=document.getElementById('vp');
  if(!vp)return;
  let lastTap=0, tapTimer=null;
  let pinchStartDist=0, pinchStartScale=1, pinchMidX=0, pinchMidY=0;

  vp.addEventListener('touchstart',e=>{
    if(e.target.classList.contains('tt')||e.target.classList.contains('hs')||transitioning)return;
    if(e.touches.length===2){
      dragging=false;
      const r=vp.getBoundingClientRect();
      pinchStartDist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY);
      pinchMidX=((e.touches[0].clientX+e.touches[1].clientX)/2)-r.left;
      pinchMidY=((e.touches[0].clientY+e.touches[1].clientY)/2)-r.top;
      pinchStartScale=curScale;
    } else {
      dragging=true;
      lastX=e.touches[0].clientX;
      lastY=e.touches[0].clientY;
    }
  },{passive:true});

  vp.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(transitioning)return;
    if(e.touches.length===2){
      dragging=false;
      const d=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY);
      const ratio=d/pinchStartDist;
      const raw=pinchStartScale*ratio;
      // Pinching out past start scale when at 1× → go back
      if(raw<0.72 && curScale<=1.05 && G.viewStack.length>1){
        crossfadeBack();return;
      }
      const s=Math.max(1,Math.min(5,raw));
      const ox=(pinchMidX-panX)/curScale;
      const oy=(pinchMidY-panY)/curScale;
      curScale=s;
      if(curScale===1){panX=0;panY=0;}
      else{panX=pinchMidX-ox*curScale;panY=pinchMidY-oy*curScale;}
      applyTransform();
    } else if(dragging&&curScale>1){
      panX+=e.touches[0].clientX-lastX;
      panY+=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX;
      lastY=e.touches[0].clientY;
      applyTransform();
    }
  },{passive:false});

  vp.addEventListener('touchend',e=>{
    const wasDragging=dragging;
    dragging=false;
    if(e.touches.length>0)return;
    if(wasDragging||e.target.classList.contains('tt')||e.target.classList.contains('hs')||transitioning)return;
    const now=Date.now();
    if(now-lastTap<300){
      clearTimeout(tapTimer);
      const t=e.changedTouches[0];
      const r=vp.getBoundingClientRect();
      const px=t.clientX-r.left, py=t.clientY-r.top;
      if(curScale>1.5){
        curScale=1;panX=0;panY=0;applyTransform();
      } else {
        const s=3, ox=(px-panX)/curScale, oy=(py-panY)/curScale;
        curScale=s;panX=px-ox*s;panY=py-oy*s;
        applyTransform();
      }
    } else {tapTimer=setTimeout(()=>{},310);}
    lastTap=now;
  },{passive:true});

  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    if(transitioning)return;
    const r=vp.getBoundingClientRect();
    const px=e.clientX-r.left, py=e.clientY-r.top;
    const raw=curScale*(e.deltaY<0?1.2:1/1.2);
    if(raw<0.72&&curScale<=1.05&&G.viewStack.length>1){crossfadeBack();return;}
    const s=Math.max(1,Math.min(5,raw));
    const ox=(px-panX)/curScale, oy=(py-panY)/curScale;
    curScale=s;
    if(curScale===1){panX=0;panY=0;}
    else{panX=px-ox*curScale;panY=py-oy*curScale;}
    applyTransform();
  },{passive:false});

  vp.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('tt')||e.target.classList.contains('hs'))return;
    dragging=true;lastX=e.clientX;lastY=e.clientY;e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging||curScale<=1)return;
    panX+=e.clientX-lastX;panY+=e.clientY-lastY;
    lastX=e.clientX;lastY=e.clientY;applyTransform();
  });
  window.addEventListener('mouseup',()=>dragging=false);
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
// ── FOUND OBJECT ───────────────────────────────────────────────────────────
function foundObj(obj,vx,vy,svg){
  if(G.found.includes(obj.id))return;
  try{getAC();}catch(e){}
  playFound();
  G.found.push(obj.id);
  svg.querySelectorAll(`.tt[data-id="${obj.id}"]`).forEach(t=>t.remove());
  // Sparkles at screen position
  const sl=document.getElementById('sl');
  if(sl){
    const r=sl.getBoundingClientRect();
    sparkles(r.left+(vx/960)*r.width, r.top+(vy/800)*r.height);
  }
  // Expanding ring on SVG
  const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',vx);ring.setAttribute('cy',vy);ring.setAttribute('r','0');
  ring.setAttribute('fill','rgba(154,0,32,0.1)');ring.setAttribute('stroke','#9A0020');
  ring.setAttribute('stroke-width','5');ring.setAttribute('pointer-events','none');
  svg.appendChild(ring);
  let rv=0;
  const anim=setInterval(()=>{
    rv+=4;ring.setAttribute('r',rv);
    ring.setAttribute('opacity',(1.2-rv/60).toString());
    if(rv>60){clearInterval(anim);ring.remove();}
  },14);
  // Update chips
  document.querySelectorAll('.chip').forEach((c,i)=>{
    if(ALL_OBJECTS[i]&&ALL_OBJECTS[i].id===obj.id)c.classList.add('found');
  });
  const badge=document.querySelector('.depth-badge');
  if(badge)badge.textContent=`${G.found.length}/${ALL_OBJECTS.length} ✦`;
  const pf=document.querySelector('.progfill');
  if(pf)pf.style.width=((G.found.length/ALL_OBJECTS.length)*100)+'%';
  if(G.found.length===ALL_OBJECTS.length){
    G.completed.grand=(G.completed.grand||0)+1;
    localStorage.setItem('sp_done',JSON.stringify(G.completed));
    playComplete();
    setTimeout(()=>{G.screen='complete';render();},900);
  }
}

// ── HINT ───────────────────────────────────────────────────────────────────
function showHint(){
  const view=curView();
  const here=view.objects.filter(o=>!G.found.includes(o.id));
  if(!here.length){
    const remaining=ALL_OBJECTS.filter(o=>!G.found.includes(o.id));
    if(remaining.length){
      const pick=remaining[0];
      const h=document.createElement('div');
      h.style.cssText='position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(26,0,8,0.88);color:white;padding:0.55rem 1.1rem;border-radius:2rem;font-size:0.78rem;font-weight:700;z-index:100;pointer-events:none;max-width:85%;text-align:center;';
      h.textContent=`${pick.icon} ${pick.label} — look in: ${VIEWS[pick.view].label}`;
      document.body.appendChild(h);setTimeout(()=>h.remove(),3200);
    }
    return;
  }
  const pick=here[Math.floor(Math.random()*here.length)];
  const svg=document.querySelector('#sl svg');
  if(!svg)return;
  const vx=(pick.cx/100)*960, vy=(pick.cy/100)*800;
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',vx);c.setAttribute('cy',vy);
  c.setAttribute('r',Math.max((pick.r||30)*1.8,50));
  c.setAttribute('fill','none');c.setAttribute('stroke','#FFD700');
  c.setAttribute('stroke-width','5');c.setAttribute('stroke-dasharray','12 7');
  c.setAttribute('opacity','0.9');c.setAttribute('pointer-events','none');
  svg.appendChild(c);
  let op=0.9,dir=-1;
  const pulse=setInterval(()=>{
    op+=dir*0.05;if(op<0.2)dir=1;if(op>0.9)dir=-1;
    c.setAttribute('opacity',op.toString());
  },50);
  setTimeout(()=>{clearInterval(pulse);c.remove();},3500);
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function startGame(){
  const inp=document.getElementById('ni');
  const v=inp?inp.value.trim():G.name;
  if(!v)return;
  G.name=v;localStorage.setItem('sp_name',v);
  G.screen='game';G.viewStack=['root'];panX=0;panY=0;curScale=1;render();
}
function toggleChips(){
  const cb=document.querySelector('.chipbar');
  if(cb)cb.classList.toggle('open');
}

function resetGame(){G.found=[];G.viewStack=['root'];G.screen='game';panX=0;panY=0;curScale=1;render();}

render();
</script></body></html>
