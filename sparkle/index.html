<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sparkle Studio | Celeb Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050206; 
  --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
  --gold-static: #aa771c;
  --accent: #ff007a;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.1);
  --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { 
    background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    background-image: radial-gradient(circle at 50% -20%, #2a0a2f 0%, #050206 70%);
}

/* --- PREMIUM HEADER --- */
.header {
  padding: env(safe-area-inset-top, 20px) 24px 10px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 10;
}

.studio-logo {
  font-family: 'Marcellus', serif; font-size: 1.4rem; letter-spacing: 4px;
  background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-transform: uppercase;
}

.stat-pill {
  background: var(--glass); border: 1px solid var(--glass-border);
  padding: 6px 16px; border-radius: 100px; backdrop-filter: blur(10px);
  display: flex; flex-direction: column; align-items: center;
}

.stat-label { font-size: 0.6rem; color: var(--gold-static); font-weight: 900; letter-spacing: 1px; }
.stat-value { font-size: 1.2rem; font-weight: 300; }

/* --- GAME BOARD (The Reveal Stage) --- */
.stage {
  flex: 1; position: relative; margin: 10px 20px;
  border-radius: 24px; overflow: hidden;
  box-shadow: var(--shadow); border: 1px solid var(--glass-border);
}

#celebBg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center 15%;
  transform: scale(1.1); transition: transform 2s ease-out;
}

.grid {
  display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(8, 1fr);
  gap: 2px; width: 100%; height: 100%; position: relative; z-index: 1;
}

.cell {
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 0.5px solid rgba(255,255,255,0.05);
  transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.cell.shattered {
  background: transparent; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
  border: none;
}

.cell.selected {
  background: rgba(255, 255, 255, 0.1);
  box-shadow: inset 0 0 15px var(--gold-static);
}

/* --- POTION DESIGN --- */
.potion {
  width: 80%; height: 80%; display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
  animation: float 3s ease-in-out infinite;
}

@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

/* --- INPUT & GUESS --- */
.footer-controls {
  padding: 20px 24px env(safe-area-inset-bottom, 20px);
  background: linear-gradient(to top, #000, transparent);
}

.input-wrapper {
  position: relative; display: flex; align-items: center;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 16px; padding: 4px;
}

#guessInput {
  flex: 1; background: transparent; border: none; outline: none;
  padding: 14px 16px; color: #fff; font-size: 1rem; font-family: 'Montserrat';
}

.btn-reveal {
  background: var(--gold); color: #000; border: none;
  padding: 12px 24px; border-radius: 12px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;
}

/* --- WIN OVERLAY --- */
#winOverlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.95);
  z-index: 100; display: none; flex-direction: column;
  align-items: center; justify-content: center; backdrop-filter: blur(20px);
}

.win-card {
  text-align: center; border: 1px solid var(--gold-static);
  padding: 40px; border-radius: 30px; background: #000;
}
</style>
</head>
<body>

<div id="winOverlay">
    <div class="win-card">
        <h1 class="studio-logo" style="font-size: 2.5rem;">Bravo</h1>
        <p id="winMsg" style="margin: 20px 0; font-weight: 300;"></p>
        <button class="btn-reveal" onclick="location.reload()">Next Set</button>
    </div>
</div>

<div class="header">
  <div class="studio-logo">Sparkle Studio</div>
  <div class="stat-pill">
    <div class="stat-label">Points</div>
    <div id="score" class="stat-value">0</div>
  </div>
</div>

<div class="stage">
  <div id="celebBg"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="footer-controls">
  <div style="display: flex; justify-content: space-between; margin-bottom: 12px; padding: 0 4px;">
    <span id="regionTag" style="font-size: 0.6rem; color: var(--gold-static); font-weight: 900;">STUDIO SESSION</span>
    <span id="progress" style="font-size: 0.6rem; color: #666;">REVEAL: 0%</span>
  </div>
  <div class="input-wrapper">
    <input type="text" id="guessInput" placeholder="Spelling check..." autocomplete="off">
    <button class="btn-reveal" onclick="checkGuess()">Guess</button>
  </div>
</div>

<script>
const DB = [
    { name: "Shah Rukh Khan", cat: "IN", img: "https://www.themoviedb.org/t/p/original/m99asfLpSrkXo33U3v89j682Yf0.jpg" },
    { name: "Virat Kohli", cat: "IN", img: "https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_320/lsci/db/PICTURES/CMS/316500/316523.png" },
    { name: "Zendaya", cat: "INT", img: "https://www.themoviedb.org/t/p/original/xr96V4v2vX7Zz9D7v6M5uXzF6pB.jpg" },
    { name: "Lionel Messi", cat: "INT", img: "https://www.themoviedb.org/t/p/original/hUatL0UfA8FzB6uXzN4hE6Yc1f4.jpg" }
];

const ICONS = ['🌸', '✨', '💧', '🔥', '🔮', '💎', '🌙', '☀️', '🌈', '👑'];
let state = { cells: Array(40).fill(null), shattered: Array(40).fill(false), selected: null, score: 0, current: null, country: "INT" };

async function init() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        state.country = data.country_code === "IN" ? "IN" : "INT";
    } catch(e) { state.country = "INT"; }
    
    document.getElementById('regionTag').innerText = `REGION: ${state.country === 'IN' ? 'INDIA' : 'GLOBAL'}`;
    newRound();
}

function newRound() {
    const pool = DB.filter(c => c.cat === state.country || c.cat === "INT");
    state.current = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById('celebBg').style.backgroundImage = `url(${state.current.img})`;
    document.getElementById('celebBg').style.transform = "scale(1.1)";
    
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for(let i=0; i<40; i++) {
        const div = document.createElement('div');
        div.className = 'cell';
        div.id = `c-${i}`;
        div.onclick = () => tap(i);
        grid.appendChild(div);
    }
    for(let i=0; i<8; i++) spawn();
}

function tap(i) {
    if (state.selected === null) {
        if (state.cells[i]) {
            state.selected = i;
            document.getElementById(`c-${i}`).classList.add('selected');
        } else { state.cells[i] = 1; render(i); }
    } else {
        const from = state.selected;
        document.getElementById(`c-${from}`).classList.remove('selected');
        state.selected = null;
        if (from === i) return;

        if (state.cells[i] === state.cells[from] && state.cells[i] < 10) {
            state.cells[i]++; state.cells[from] = null;
            state.score += state.cells[i] * 50;
            if (state.cells[i] >= 5) shatter(i);
            render(from); render(i);
            update();
            setTimeout(spawn, 150);
        } else {
            [state.cells[i], state.cells[from]] = [state.cells[from], state.cells[i]];
            render(from); render(i);
        }
    }
}

function shatter(idx) {
    state.shattered[idx] = true;
    [idx-1, idx+1, idx-5, idx+5].forEach(n => {
        if(n >= 0 && n < 40 && Math.random() > 0.6) state.shattered[n] = true;
    });
    // Zoom background slightly on shatter for "impact"
    document.getElementById('celebBg').style.transform = `scale(${1.1 + (state.score/5000)})`;
    for(let j=0; j<40; j++) if(state.shattered[j]) render(j);
}

function checkGuess() {
    const val = document.getElementById('guessInput').value.trim().toLowerCase();
    if (val === state.current.name.toLowerCase()) {
        document.getElementById('winMsg').innerText = `You correctly identified ${state.current.name}!`;
        document.getElementById('winOverlay').style.display = 'flex';
    } else {
        document.getElementById('guessInput').value = "";
    }
}

function spawn() {
    const empty = state.cells.map((v, i) => v === null ? i : null).filter(v => v !== null);
    if (empty.length > 0) {
        const idx = empty[Math.floor(Math.random() * empty.length)];
        state.cells[idx] = 1; render(idx);
    }
}

function render(i) {
    const cell = document.getElementById(`c-${i}`);
    const val = state.cells[i];
    cell.innerHTML = val ? `<div class="potion">${ICONS[val-1]}</div>` : '';
    if (state.shattered[i]) cell.classList.add('shattered');
}

function update() {
    document.getElementById('score').innerText = state.score;
    const count = state.shattered.filter(v => v).length;
    document.getElementById('progress').innerText = `REVEAL: ${Math.floor((count/40)*100)}%`;
}

init();
</script>
</body>
</html>
