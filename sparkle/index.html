<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sparkle Studio | Clean Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050206; 
  --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
  --gold-static: #aa771c;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { 
    background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

.header { padding: env(safe-area-inset-top, 20px) 24px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
.studio-logo { font-family: 'Marcellus', serif; font-size: 1.1rem; letter-spacing: 3px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }

.stage { flex: 1; position: relative; margin: 10px 20px; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #000; }
#celebBg { position: absolute; inset: 0; background-size: cover; background-position: center 15%; transform: scale(1.1); }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(8, 1fr); gap: 1px; width: 100%; height: 100%; position: relative; z-index: 1; }

.cell {
  background: rgba(10, 10, 15, 0.98);
  backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
  transition: all 0.4s ease;
  display: flex; align-items: center; justify-content: center;
}

/* Revealed State */
.cell.shattered {
  background: transparent !important;
  backdrop-filter: blur(0px) !important;
  -webkit-backdrop-filter: blur(0px) !important;
  border: none !important;
}

/* Force-hide any potion that might be inside a shattered cell */
.cell.shattered .potion {
  display: none !important;
  opacity: 0 !important;
  pointer-events: none;
}

.potion { font-size: 1.6rem; animation: pop 0.2s ease-out; pointer-events: none; }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

.footer { padding: 20px 24px env(safe-area-inset-bottom, 20px); }
.input-wrapper { display: flex; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 4px; }
#guessInput { flex: 1; background: transparent; border: none; padding: 14px; color: #fff; font-family: 'Montserrat'; outline: none; }
.btn-check { background: var(--gold); color: #000; border: none; padding: 0 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 0.7rem; }

#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
</style>
</head>
<body onclick="initAudio()">

<div id="overlay">
    <h1 class="studio-logo" style="font-size: 2.2rem;">GHAZAB!</h1>
    <p id="winMsg" style="margin: 20px;"></p>
    <button class="btn-check" style="height:45px" onclick="location.reload()">Next Star</button>
</div>

<div class="header">
  <div class="studio-logo">Sparkle Studio</div>
  <div id="progress" style="font-size: 0.6rem; font-weight: 900; color: var(--gold-static);">REVEAL: 50%</div>
</div>

<div class="stage">
  <div id="celebBg"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="footer">
  <div class="input-wrapper">
    <input type="text" id="guessInput" placeholder="Guess the name..." autocomplete="off">
    <button class="btn-check" onclick="checkGuess()">Check</button>
  </div>
</div>

<script>
const DB = [
    { name: "Shah Rukh Khan", img: "https://www.themoviedb.org/t/p/original/m99asfLpSrkXo33U3v89j682Yf0.jpg" },
    { name: "Virat Kohli", img: "https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_320/lsci/db/PICTURES/CMS/316500/316523.png" },
    { name: "Deepika Padukone", img: "https://www.themoviedb.org/t/p/original/69Yp9fM6I20f8Mst0E89v54M4D.jpg" }
];
const ICONS = ['🌸', '✨', '💧', '🔥', '🔮', '💎', '🌙', '☀️', '🌈', '👑'];
let S = { cells: Array(40).fill(null), shattered: Array(40).fill(false), current: null, selected: null };

let audioCtx = null;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSfx(f) {
  if(!audioCtx) return;
  const t = audioCtx.currentTime, o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(0.05, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.1); o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(t + 0.1);
}

function init() {
    S.current = DB[Math.floor(Math.random() * DB.length)];
    document.getElementById('celebBg').style.backgroundImage = `url(${S.current.img})`;
    
    // Define the Portrait Area (50% of the face)
    const faceArea = [6,7,8,11,12,13,16,17,18,21,22,23,26,27,28,31,32,33];
    
    const grid = document.getElementById('grid');
    grid.innerHTML = ''; // Clear previous grid

    for(let i=0; i<40; i++) {
        const div = document.createElement('div');
        div.className = 'cell';
        div.id = `c-${i}`;

        // FIX 1: MARK SHATTERED IMMEDIATELY
        if (faceArea.includes(i)) {
            S.shattered[i] = true;
            div.classList.add('shattered');
        }

        div.onclick = (e) => { e.stopPropagation(); tap(i); };
        grid.appendChild(div);
    }

    // FIX 2: ONLY SPAWN IN NON-SHATTERED CELLS
    for(let i=0; i<8; i++) spawn();
}

function spawn() {
    // Search for cells that are NEITHER shattered NOR occupied
    const empty = [];
    for(let i=0; i<40; i++) {
        if (!S.shattered[i] && S.cells[i] === null) {
            empty.push(i);
        }
    }

    if (empty.length > 0) {
        const idx = empty[Math.floor(Math.random() * empty.length)];
        S.cells[idx] = 1; 
        render(idx);
    }
}

function tap(i) {
    if (S.shattered[i]) return; // Cannot interact with empty air

    if (S.selected === null) {
        if (S.cells[i]) {
            S.selected = i;
            document.getElementById(`c-${i}`).classList.add('selected');
        } else {
            S.cells[i] = 1; render(i); playSfx(300);
        }
    } else {
        const from = S.selected;
        document.getElementById(`c-${from}`).classList.remove('selected');
        S.selected = null;
        if (from === i) return;

        if (S.cells[i] === S.cells[from]) {
            S.cells[i] += 1;
            S.cells[from] = null;
            shatter(i);
            render(from); render(i);
            setTimeout(spawn, 100);
        } else {
            [S.cells[i], S.cells[from]] = [S.cells[from], S.cells[i]];
            render(from); render(i);
        }
    }
}

function shatter(idx) {
    S.shattered[idx] = true;
    S.cells[idx] = null; // Clear potion data immediately
    playSfx(600);
    
    // Tiny splash reveal for neighbors
    [idx-1, idx+1, idx-5, idx+5].forEach(n => {
        if(n >= 0 && n < 40 && Math.random() > 0.7) {
            S.shattered[n] = true;
            S.cells[n] = null;
        }
    });
    
    for(let j=0; j<40; j++) render(j);
    updateProgress();
}

function render(i) {
    const cell = document.getElementById(`c-${i}`);
    
    // FIX 3: DOUBLE PROTECTION - Clear HTML if shattered
    if (S.shattered[i]) {
        cell.classList.add('shattered');
        cell.innerHTML = ''; 
    } else {
        cell.innerHTML = S.cells[i] ? `<div class="potion">${ICONS[S.cells[i]-1]}</div>` : '';
    }
}

function updateProgress() {
    const count = S.shattered.filter(v => v).length;
    document.getElementById('progress').innerText = `REVEAL: ${Math.floor((count/40)*100)}%`;
}

function checkGuess() {
    const val = document.getElementById('guessInput').value.trim().toLowerCase();
    if (val === S.current.name.toLowerCase()) {
        document.getElementById('winMsg').innerText = `You identified ${S.current.name}!`;
        document.getElementById('overlay').style.display = 'flex';
    } else {
        document.getElementById('guessInput').value = "";
    }
}

init();
</script>
</body>
</html>
