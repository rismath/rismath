        :root {
            --bg: #1A0A2E;
            --card: #120820;
            --card2: #1E0F35;
            --border: rgba(255,255,255,0.08);
            --gold: #FFD700;
            --pink: #FF4FA0;
            --blue: #4FC3F7;
            --green: #69F0AE;
            --red: #FF5252;
            --text: #F0E6FF;
            --muted: rgba(240,230,255,0.4);

        * { box-sizing:border-box; margin:0; padding:0; }
        body {

            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex; align-items: flex-start; justify-content: center;
            padding: 0.75rem; overflow-x: hidden;

        #root { width:100%; max-width:440px; }

        @keyframes slideUp { from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;} }
        @keyframes popIn { 0%{transform:scale(0.6);opacity:0;}70%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;} }
        @keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);} }
        @keyframes chipIn { from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);} }
        @keyframes burstUp { 0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-120px) scale(0.3);opacity:0;} }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) scale(0.9);}to{opacity:1;transform:translateX(-50%) scale(1);} }
        @keyframes toastOut { from{opacity:1;}to{opacity:0;} }
        @keyframes filmstrip { 0%{background-position:0 0;}100%{background-position:40px 0;} }

        .slide-up { animation: slideUp 0.35s ease forwards; }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        .float { animation: float 3s ease-in-out infinite; }
        .game-title { font-family: 'Bebas Neue', cursive; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.4rem;
            backdrop-filter: blur(16px);

        /* Filmstrip accent bar */
        .filmstrip {
            height: 8px;
            background: repeating-linear-gradient(90deg, #FFD700 0px, #FFD700 10px, #1A0A2E 10px, #1A0A2E 20px);
            border-radius: 4px;
            margin-bottom: 0.75rem;
            animation: filmstrip 1s linear infinite;

        /* Movie card */
        .movie-card {
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 0.75rem;
            animation: slideUp 0.3s ease forwards;
        }
        .movie-card-header {
            padding: 0.9rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }
        .movie-poster {
            width: 72px; height: 90px;
            border-radius: 0.6rem;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex-shrink: 0;
            position: relative; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
        }
        .poster-icon { font-size: 2.2rem; z-index: 1; }
        .poster-year {
            font-family: 'Bebas Neue', cursive;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            z-index: 1; margin-top: 2px;

        .movie-meta { flex: 1; }
        .movie-genre-badge {
            display: inline-block;
            padding: 2px 8px; border-radius: 20px;
            font-size: 0.62rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-bottom: 4px;

        .movie-mystery {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.7rem;
            color: rgba(255,255,255,0.12);
            letter-spacing: 0.2em; line-height: 1;

        .movie-mystery-sub { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

        .clues-section { padding: 0.7rem 1rem; border-top: 1px solid var(--border); }
        .clues-label { font-size: 0.6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.55rem; }
        .clues-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.45rem; }
        .clue-chip {
            border-radius: 0.65rem; padding: 0.5rem 0.7rem;
            display: flex; align-items: flex-start; gap: 0.45rem;
            animation: chipIn 0.3s ease forwards;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .clue-chip:nth-child(1){animation-delay:0.05s;opacity:0;}
        .clue-chip:nth-child(2){animation-delay:0.1s;opacity:0;}
        .clue-chip:nth-child(3){animation-delay:0.15s;opacity:0;}
        .clue-chip:nth-child(4){animation-delay:0.2s;opacity:0;}
        .clue-chip:nth-child(5){animation-delay:0.25s;opacity:0;}
        .clue-chip.full { grid-column: 1/-1; }

        .chip-value { font-size: 0.82rem; font-weight: 700; line-height: 1.3; }

        .chip-pink { background: rgba(255,79,160,0.1); }
        .chip-pink .chip-value { color: #FF8EC8; } .chip-pink .chip-label { color: #FF8EC8; }
        .chip-blue { background: rgba(79,195,247,0.1); }
        .chip-blue .chip-value { color: #4FC3F7; } .chip-blue .chip-label { color: #4FC3F7; }
        .chip-green { background: rgba(105,240,174,0.1); }
        .chip-green .chip-value { color: #69F0AE; } .chip-green .chip-label { color: #69F0AE; }
        .chip-orange { background: rgba(255,171,64,0.1); }
        .chip-orange .chip-value { color: #FFAB40; } .chip-orange .chip-label { color: #FFAB40; }

        .go-score { font-family:'Bebas Neue',cursive; font-size:4.5rem; color:var(--gold); line-height:1; }
        .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem; margin-bottom:0.75rem; }
        .stat-box { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:0.75rem; padding:0.6rem 0.4rem; text-align:center; }
        .stat-box-val { font-family:'Bebas Neue',cursive; font-size:1.4rem; line-height:1.1; }
        .stat-box-label { font-size:0.6rem; font-weight:700; color:var(--muted); text-transform:uppercase; margin-top:2px; }
        .score-preview { background:#0A0014; border:1px solid rgba(255,215,0,0.2); border-radius:0.75rem; padding:0.75rem; font-family:monospace; font-size:0.75rem; color:#FFD700; line-height:1.7; white-space:pre; overflow-x:auto; margin-bottom:0.5rem; }
        .share-btn { background:#25D366; color:white; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; padding:0.75rem; border-radius:0.65rem; border:none; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:7px; transition:all 0.2s; margin-bottom:0.4rem; }

        .btn-sm { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--muted); font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:700; padding:0.6rem 0.75rem; border-radius:0.6rem; cursor:pointer; flex:1; transition:all 0.2s; }
        .btn-sm:hover { background:rgba(255,255,255,0.1); color:var(--text); }
        .btn-play-again { flex:1; background:linear-gradient(135deg,#FFD700,#FF4FA0); border:none; color:#1A0A2E; font-family:'Bebas Neue',cursive; font-size:1.1rem; padding:0.9rem; border-radius:0.85rem; cursor:pointer; letter-spacing:0.05em; }
        .btn-home { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--muted); font-size:1.1rem; padding:0.9rem 1rem; border-radius:0.85rem; cursor:pointer; }
        .btn-pair { display:flex; gap:0.5rem; margin-top:0.75rem; }
        .rank-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:0.6rem; padding:0.35rem 0.75rem; margin-bottom:0.75rem; }

        .emoji-burst { position:fixed; pointer-events:none; font-size:1.8rem; z-index:1000; animation:burstUp 0.9s ease forwards; }
        canvas { display:none; }
    </style>
</head>

// ── DAILY CHALLENGE SYSTEM ─────────────────────────────────────────────────────
function getTodayKey(){ const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }

function getDailyMovies(){
    const d=new Date();
    const seed = d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()+500; // +500 to differ from Googly
    const shuffled=[...UNIQUE_MOVIES];
    let s=seed;
    for(let i=shuffled.length-1;i>0;i--){s=(s*1103515245+12345)&0x7fffffff;const j=s%(i+1);[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
    return shuffled.slice(0,8);
}

function getTrickyQ(){
    const d=new Date();
    const dayOfYear=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);
    return TRICKY[(dayOfYear+30)%TRICKY.length]; // +30 to differ from Googly
}

function getDailyState(){ const s=localStorage.getItem('filmiDaily_'+getTodayKey()); return s?JSON.parse(s):null; }

// ── SOUND ─────────────────────────────────────────────────────────────────────
const AC2 = window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function getAudio(){ if(!audioCtx)audioCtx=new AC2(); return audioCtx; }

function playCorrect(){ if(G.muted)return; try{
    const ctx=getAudio(),t=ctx.currentTime;
    // Applause burst
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.7,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.35;
    const ns=ctx.createBufferSource(); ns.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.setValueAtTime(1200,t); f.frequency.exponentialRampToValueAtTime(2500,t+0.3); f.Q.value=0.6;
    const ng=ctx.createGain(); ng.gain.setValueAtTime(0,t); ng.gain.linearRampToValueAtTime(0.3,t+0.05); ng.gain.exponentialRampToValueAtTime(0.001,t+0.7);
    ns.connect(f);f.connect(ng);ng.connect(ctx.destination);ns.start(t);ns.stop(t+0.7);
    // Ding
    const o=ctx.createOscillator(),og=ctx.createGain();
    o.type='triangle';o.frequency.value=1200;
    og.gain.setValueAtTime(0.25,t+0.05);og.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.connect(og);og.connect(ctx.destination);o.start(t+0.05);o.stop(t+0.4);
}catch(e){}}

function playWrong(){ if(G.muted)return; try{
    const ctx=getAudio(),t=ctx.currentTime;
    const o=ctx.createOscillator(),og=ctx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(140,t+0.4);
    og.gain.setValueAtTime(0.18,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.connect(og);og.connect(ctx.destination);o.start(t);o.stop(t+0.45);
}catch(e){}}

function playTimeUp(){ if(G.muted)return; try{
    const ctx=getAudio(),t=ctx.currentTime;
    [0,0.2,0.4].forEach((dl,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=500-i*80;o.type='square';g.gain.setValueAtTime(0.12,t+dl);g.gain.exponentialRampToValueAtTime(0.001,t+dl+0.15);o.connect(g);g.connect(ctx.destination);o.start(t+dl);o.stop(t+dl+0.15);});
}catch(e){}}

function toggleMute(){
    G.muted=!G.muted;
    localStorage.setItem('filmiMuted',G.muted?'1':'0');
    document.querySelectorAll('#mute-btn').forEach(b=>{b.textContent=G.muted?'🔇':'🔊';b.title=G.muted?'Unmute':'Mute';});
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function pickClues(m){
    const h=m.clues.find(c=>c.highlight);
    const rest=m.clues.filter(c=>!c.highlight).sort(()=>Math.random()-0.5).slice(0,4);
    return [h,...rest];
}

function pickNext(){
    if(G.used.length>=UNIQUE_MOVIES.length)G.used=[];
    let idx; do{idx=Math.floor(Math.random()*UNIQUE_MOVIES.length);}while(G.used.includes(idx));
    G.used.push(idx);
    const m=UNIQUE_MOVIES[idx];
    const wrong=UNIQUE_MOVIES.filter((_,i)=>i!==idx).sort(()=>Math.random()-0.5).slice(0,3);
    G.current=m; G.clues=pickClues(m);
    G.options=[m,...wrong].sort(()=>Math.random()-0.5);
}

function getGenre(g){ return GENRES[g]||GENRES['Drama']; }

function getRank(s){
    if(s>=400)return{emoji:'🏆',rank:'BLOCKBUSTER',color:'#FFD700'};
    if(s>=280)return{emoji:'💎',rank:'SUPERHIT',color:'#CE93D8'};
    if(s>=180)return{emoji:'🥇',rank:'HIT',color:'#FFAB40'};
    if(s>=100)return{emoji:'⚡',rank:'AVERAGE',color:'#69F0AE'};
    if(s>=50)return{emoji:'🔥',rank:'RISING',color:'#FF8A65'};
    return{emoji:'🎬',rank:'FLOP',color:'#90A4AE'};
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
let timer;
function startTimer(){
    timer=setInterval(()=>{
        G.timeLeft--;
        if(G.timeLeft<=0){playTimeUp();endGame();return;}
        const tc=G.timeLeft>20?'var(--green)':G.timeLeft>10?'var(--gold)':'var(--red)';
        const pct=(G.timeLeft/60)*100;
        const tv=document.getElementById('timer-val');
        const tf=document.getElementById('timer-fill');
        if(tv){tv.textContent=G.timeLeft+'s';tv.style.color=tc;}
        if(tf){tf.style.width=pct+'%';tf.style.background=tc;}
    },1000);
}

    try{getAudio();}catch(e){}
    trackEvent('filmi_start',{p:G.playerName||'anon',mode:'daily'});
    const dm=getDailyMovies();
    G={...G,screen:'playing',score:0,timeLeft:60,streak:0,bestStreak:0,total:0,correct:0,mode:'daily',dailyMovies:dm,dailyIndex:0,dailyDone:false};
    const m=dm[0];
    const wrong=UNIQUE_MOVIES.filter(x=>x.title!==m.title).sort(()=>Math.random()-0.5).slice(0,3);
    G.current=m;G.clues=pickClues(m);G.options=[m,...wrong].sort(()=>Math.random()-0.5);
    startTimer(); render();
}

function answerTricky(sel){
    const ok=sel===G.trickyQ.ans;
    G.trickyAnswered=true;G.trickyCorrect=ok;
    if(ok)playCorrect();else playWrong();
    localStorage.setItem('filmiTricky_'+getTodayKey(),JSON.stringify({correct:ok,ans:sel}));
    trackEvent('filmi_tricky',{correct:ok});
    render();
}

function ans(name,btn){
    G.total++;
    const ok=name===G.current.title;
    if(btn){
        btn.classList.add(ok?'correct':'wrong');
        if(!ok)document.querySelectorAll('.btn-ans').forEach(b=>{if(b.dataset.name===G.current.title)b.classList.add('correct');});
        setTimeout(()=>document.querySelectorAll('.btn-ans').forEach(b=>b.classList.remove('correct','wrong')),650);
    }
    if(ok){
        playCorrect();G.correct++;G.streak++;
        if(G.streak>G.bestStreak)G.bestStreak=G.streak;
        G.score+=10+(G.streak*3);
        if(G.streak%5===0)G.timeLeft+=3;
        spawnE(['🎬','🔥','💥','⭐','🎭'][Math.floor(Math.random()*5)]);
        if(G.streak%3===0)toast(G.streak+' in a row! 🔥','#1B5E20');
    }else{
        playWrong();G.streak=0;
        toast('Was: '+G.current.title,'#7B1A1A');
    }

    if(G.mode==='daily'){
        G.dailyIndex++;
        if(G.dailyIndex>=G.dailyMovies.length){
            clearInterval(timer);G.dailyDone=true;G.dailyScore=G.score;
            saveDailyState({done:true,score:G.score,correct:G.correct,total:G.total,bestStreak:G.bestStreak});
            if(G.score>G.highScore){G.highScore=G.score;localStorage.setItem('filmiHS',G.score.toString());}
            G.screen='gameover';render();return;
        }
        const m=G.dailyMovies[G.dailyIndex];
        const wrong=UNIQUE_MOVIES.filter(x=>x.title!==m.title).sort(()=>Math.random()-0.5).slice(0,3);
        G.current=m;G.clues=pickClues(m);G.options=[m,...wrong].sort(()=>Math.random()-0.5);
        render();return;
    }
    pickNext();render();
}

function bar(n,m){return'█'.repeat(Math.min(n,m))+'░'.repeat(m-Math.min(n,m));}

function genText(){
    const acc=G.total>0?Math.round(G.correct/G.total*100):0;
    const{emoji,rank}=getRank(G.score);
    const d=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    const n=G.playerName||'Player';
    const mode=G.mode==='daily'?'Daily Challenge':'Practice';
    return`🎬 Filmi — ${mode}\n👤 ${n}  •  📅 ${d}\n${'─'.repeat(28)}\n${emoji} Rank: ${rank}\n⭐ Score:     ${G.score}\n🔥 Streak:   ${G.bestStreak}  ${bar(G.bestStreak,10)}\n🎯 Accuracy: ${acc}%\n✅ Correct:  ${G.correct}/${G.total}\n${'─'.repeat(28)}\n🏅 Personal Best: ${G.highScore}\n\nCan you beat ${n}? 👇\nplayfilmi.in`;
}

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function genImg(){
    const cv=document.getElementById('share-canvas');const ctx=cv.getContext('2d');
    const W=600,H=700;cv.width=W;cv.height=H;
    const acc=G.total>0?Math.round(G.correct/G.total*100):0;
    const{emoji,rank,color}=getRank(G.score);
    const d=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    const n=G.playerName||'Player';
    // BG
    ctx.fillStyle='#1A0A2E';ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=0.2;ctx.fillStyle='#FF4FA0';ctx.beginPath();ctx.arc(100,100,200,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4FC3F7';ctx.beginPath();ctx.arc(500,600,180,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // Gold-pink gradient top bar
    const grad=ctx.createLinearGradient(0,0,W,0);grad.addColorStop(0,'#FFD700');grad.addColorStop(1,'#FF4FA0');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,5);
    // Title
    ctx.font='bold 52px "Arial Black",sans-serif';ctx.fillStyle='#FFD700';ctx.textAlign='center';ctx.fillText('Filmi',W/2,70);
    ctx.font='17px Arial';ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillText(n+'  •  '+d,W/2,98);
    // Rank
    ctx.fillStyle='rgba(255,255,255,0.07)';rr(ctx,W/2-110,112,220,76,16);ctx.fill();
    ctx.font='46px Arial';ctx.fillText(emoji,W/2-28,172);ctx.font='bold 22px Arial';ctx.fillStyle=color;ctx.fillText(rank,W/2+55,163);
    // Score
    ctx.font='bold 100px "Arial Black",sans-serif';ctx.fillStyle='#FFD700';ctx.fillText(G.score,W/2,322);
    ctx.font='18px Arial';ctx.fillStyle='rgba(255,255,255,0.38)';ctx.fillText('SCORE',W/2,348);
    // Stats
    const st=[{l:'STREAK',v:G.bestStreak+'🔥',c:'#FF8A65'},{l:'ACCURACY',v:acc+'%',c:'#69F0AE'},{l:'CORRECT',v:G.correct+'/'+G.total,c:'#4FC3F7'}];
    st.forEach((s,i)=>{const x=80+i*180;ctx.fillStyle='rgba(255,255,255,0.06)';rr(ctx,x-65,368,130,72,12);ctx.fill();ctx.font='bold 24px Arial';ctx.fillStyle=s.c;ctx.textAlign='center';ctx.fillText(s.v,x,405);ctx.font='12px Arial';ctx.fillStyle='rgba(255,255,255,0.32)';ctx.fillText(s.l,x,423);});
    const bY=466,bW=W-120;
    ctx.font='13px Arial';ctx.fillStyle='rgba(255,255,255,0.32)';ctx.textAlign='left';ctx.fillText('Best Streak',60,bY);ctx.textAlign='right';ctx.fillText(G.bestStreak+'/10',W-60,bY);
    ctx.fillStyle='rgba(255,255,255,0.07)';rr(ctx,60,bY+8,bW,10,5);ctx.fill();
    if(G.bestStreak>0){ctx.fillStyle='#FF8A65';rr(ctx,60,bY+8,bW*Math.min(G.bestStreak/10,1),10,5);ctx.fill();}
    const bY2=504;ctx.font='13px Arial';ctx.fillStyle='rgba(255,255,255,0.32)';ctx.textAlign='left';ctx.fillText('Accuracy',60,bY2);ctx.textAlign='right';ctx.fillText(acc+'%',W-60,bY2);
    ctx.fillStyle='rgba(255,255,255,0.07)';rr(ctx,60,bY2+8,bW,10,5);ctx.fill();
    if(acc>0){ctx.fillStyle='#FF4FA0';rr(ctx,60,bY2+8,bW*(acc/100),10,5);ctx.fill();}
    ctx.fillStyle='rgba(255,215,0,0.07)';rr(ctx,60,542,bW,44,10);ctx.fill();
    ctx.font='14px Arial';ctx.fillStyle='rgba(255,215,0,0.45)';ctx.textAlign='center';ctx.fillText('🏅  Personal Best: '+G.highScore,W/2,569);
    ctx.font='bold 15px Arial';ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillText('Can you beat '+n+'? 👉 playfilmi.in',W/2,628);
    ctx.fillStyle=grad;ctx.fillRect(0,H-4,W,4);
    return cv.toDataURL('image/png');
}

        <div style="font-size:0.68rem;color:rgba(255,79,160,0.6);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">🧠 Filmi Trivia · ${today}</div>
        <div style="background:rgba(255,79,160,0.08);border:1px solid rgba(255,79,160,0.2);border-radius:1rem;padding:1.1rem;margin-bottom:1rem;text-align:left">
            <div style="font-family:'Bebas Neue',cursive;font-size:1.15rem;color:#FF8EC8;line-height:1.4">${q.q}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem">
            ${q.opts.map(opt=>{
                let bg='rgba(255,255,255,0.05)',border='rgba(255,255,255,0.1)',col='var(--text)';
                if(G.trickyAnswered){if(opt===q.ans){bg='rgba(105,240,174,0.15)';border='#69F0AE';col='#69F0AE';}else{bg='rgba(255,255,255,0.02)';col='rgba(255,255,255,0.25)';}}
                return`<button ${G.trickyAnswered?'disabled':''} onclick="answerTricky('${opt.replace(/'/g,"\\'")}')" style="background:${bg};border:1.5px solid ${border};color:${col};font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;padding:0.8rem 0.4rem;border-radius:0.75rem;cursor:${G.trickyAnswered?'default':'pointer'};text-align:center;line-height:1.3;">${opt}</button>`;
            }).join('')}
        </div>
        ${G.trickyAnswered?`
            <div style="background:${G.trickyCorrect?'rgba(105,240,174,0.1)':'rgba(255,82,82,0.1)'};border:1px solid ${G.trickyCorrect?'rgba(105,240,174,0.25)':'rgba(255,82,82,0.25)'};border-radius:0.85rem;padding:1rem;margin-bottom:1rem;text-align:left">
                <div style="font-size:1.5rem;margin-bottom:4px">${G.trickyCorrect?'✅':'❌'}</div>
                <div style="font-size:0.85rem;font-weight:700;color:${G.trickyCorrect?'#69F0AE':'#FF8A80'};margin-bottom:4px">${G.trickyCorrect?'Correct!':'Wrong!'} Answer: ${q.ans}</div>
                <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);line-height:1.5">${q.fact}</div>
            </div>`:''}
        <button onclick="backToMenu()" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);font-family:'Bebas Neue',cursive;font-size:1rem;padding:0.8rem;border-radius:0.75rem;cursor:pointer;letter-spacing:0.04em;">← BACK TO MENU</button>
    </div>`;
}

function render(){
    const r=document.getElementById('root');
    switch(G.screen){
        case'menu':r.innerHTML=renderMenu();break;
        case'playing':r.innerHTML=renderGame();break;
        case'gameover':r.innerHTML=renderGameOver();break;
        case'tricky':r.innerHTML=renderTricky();break;
    }
}
render();
</script>
</body>
</html>
