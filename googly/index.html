<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Rajdhani:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050D1F;
            --card: #0B1730;
            --card2: #0F1F3D;
            --border: rgba(255,255,255,0.08);
            --gold: #F5C842;
            --gold2: #E8A020;
            --green: #00C853;
            --red: #FF1744;
            --text: #E8F0FF;
            --muted: rgba(232,240,255,0.45);
        }
        * { box-sizing:border-box; margin:0; padding:0; }

        body {
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 0.75rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Stadium floodlight effect */
        body::before {
            content: '';
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse at 50% 0%, rgba(245,200,66,0.12) 0%, rgba(245,200,66,0.04) 40%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Animated crowd dots */
        body::after {
            content: '';
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        #root { width:100%; max-width:440px; position:relative; z-index:1; }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
        @keyframes popIn { 0%{transform:scale(0.5);opacity:0;}70%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;} }
        @keyframes floodIn { from{opacity:0;transform:translateY(-10px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);} }
        @keyframes shimmer { 0%{background-position:-200% 0;}100%{background-position:200% 0;} }
        @keyframes burstUp { 0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-120px) scale(0.3);opacity:0;} }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) scale(0.88);}to{opacity:1;transform:translateX(-50%) scale(1);} }
        @keyframes toastOut { from{opacity:1;}to{opacity:0;transform:translateX(-50%) scale(0.9);} }
        @keyframes chipIn { from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);} }
        @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.6;} }
        @keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);} }

        .fade-up { animation: fadeUp 0.4s ease forwards; }
        .pop-in { animation: popIn 0.45s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        .flood-in { animation: floodIn 0.35s ease forwards; }
        .float { animation: float 3s ease-in-out infinite; }

        /* ── HEADER BAR ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.8rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 1rem;
            margin-bottom: 0.75rem;
        }
        .top-stat { text-align: center; }
        .top-stat-label { font-size: 0.6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .top-stat-value { font-family: 'Black Han Sans', sans-serif; font-size: 1.6rem; line-height: 1.1; }

        /* ── TIMER BAR ── */
        .timer-wrap { margin-bottom: 0.75rem; }
        .timer-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
        .timer-fill { height: 100%; border-radius: 3px; transition: width 1s linear, background 0.5s; }

        /* ── PLAYER CARD ── */
        .player-card {
            border-radius: 1.2rem;
            padding: 0;
            margin-bottom: 0.75rem;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
            animation: floodIn 0.3s ease forwards;
        }

        .player-card-header {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.9rem 1rem;
            position: relative;
        }

        /* Jersey visual */
        .jersey {
            width: 72px;
            height: 84px;
            border-radius: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .jersey-number {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.2rem;
            line-height: 1;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            z-index: 1;
        }
        .jersey-label {
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            z-index: 1;
            margin-top: 2px;
        }
        /* Cricket bat silhouette */
        .jersey-bat {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 1.4rem;
            opacity: 0.2;
        }

        .player-meta { flex: 1; }
        .player-role-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }
        .player-mystery {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.6rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.15em;
            line-height: 1.1;
        }
        .player-mystery-sub {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 3px;
        }

        /* ── CLUE CHIPS GRID ── */
        .clues-section {
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
        }
        .clues-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.6rem;
        }
        .clues-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .clue-chip {
            border-radius: 0.65rem;
            padding: 0.55rem 0.7rem;
            display: flex;
            align-items: flex-start;
            gap: 0.45rem;
            animation: chipIn 0.3s ease forwards;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .clue-chip:nth-child(1) { animation-delay: 0.05s; opacity: 0; }
        .clue-chip:nth-child(2) { animation-delay: 0.1s; opacity: 0; }
        .clue-chip:nth-child(3) { animation-delay: 0.15s; opacity: 0; }
        .clue-chip:nth-child(4) { animation-delay: 0.2s; opacity: 0; }
        .clue-chip:nth-child(5) { animation-delay: 0.25s; opacity: 0; }
        .clue-chip.full { grid-column: 1 / -1; }
        .chip-icon { font-size: 1rem; line-height: 1; flex-shrink: 0; margin-top: 1px; }
        .chip-text { flex: 1; }
        .chip-label { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.55; margin-bottom: 1px; }
        .chip-value { font-size: 0.8rem; font-weight: 700; line-height: 1.3; }

        /* Chip colour themes */
        .chip-gold { background: rgba(245,200,66,0.12); }
        .chip-gold .chip-value { color: #F5C842; }
        .chip-gold .chip-label { color: #F5C842; }
        .chip-blue { background: rgba(64,156,255,0.12); }
        .chip-blue .chip-value { color: #64B5F6; }
        .chip-blue .chip-label { color: #64B5F6; }
        .chip-green { background: rgba(0,200,83,0.1); }
        .chip-green .chip-value { color: #69F0AE; }
        .chip-green .chip-label { color: #69F0AE; }
        .chip-orange { background: rgba(255,111,0,0.12); }
        .chip-orange .chip-value { color: #FFAB40; }
        .chip-orange .chip-label { color: #FFAB40; }
        .chip-pink { background: rgba(255,64,129,0.1); }
        .chip-pink .chip-value { color: #FF80AB; }
        .chip-pink .chip-label { color: #FF80AB; }

        /* ── ANSWER BUTTONS ── */
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .btn-ans {
            background: var(--card2);
            border: 1.5px solid rgba(255,255,255,0.1);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.85rem 0.5rem;
            border-radius: 0.85rem;
            cursor: pointer;
            transition: all 0.12s;
            text-align: center;
            line-height: 1.25;
            letter-spacing: 0.01em;
        }
        .btn-ans:hover { background: rgba(245,200,66,0.12); border-color: rgba(245,200,66,0.4); transform: scale(1.02); }
        .btn-ans:active { transform: scale(0.97); }
        .btn-ans.correct { background: rgba(0,200,83,0.2) !important; border-color: #00C853 !important; color: #69F0AE !important; }
        .btn-ans.wrong { background: rgba(255,23,68,0.2) !important; border-color: #FF1744 !important; color: #FF8A80 !important; }

        /* ── MENU ── */
        .menu-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.4rem;
            padding: 1.8rem 1.4rem;
            text-align: center;
        }
        .menu-title {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3.2rem;
            line-height: 1;
            background: linear-gradient(135deg, #F5C842, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .menu-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }

        .name-input-wrap {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            padding: 0.9rem;
            margin-bottom: 1rem;
            text-align: left;
        }
        .name-input-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 6px; }
        .name-input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0.5rem;
            padding: 0.6rem 0.8rem;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s;
        }
        .name-input:focus { border-color: var(--gold); }

        .pb-box {
            background: rgba(245,200,66,0.08);
            border: 1px solid rgba(245,200,66,0.2);
            border-radius: 0.85rem;
            padding: 0.9rem;
            margin-bottom: 1.2rem;
        }
        .pb-label { font-size: 0.62rem; font-weight: 700; color: rgba(245,200,66,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
        .pb-value { font-family: 'Black Han Sans', sans-serif; font-size: 2.8rem; color: var(--gold); line-height: 1; }

        .btn-start {
            width: 100%;
            background: linear-gradient(135deg, #F5C842, #E8A020);
            border: none;
            color: #050D1F;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            padding: 1rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 1rem;
            box-shadow: 0 4px 20px rgba(245,200,66,0.25);
        }
        .btn-start:hover { transform: scale(1.02); box-shadow: 0 6px 28px rgba(245,200,66,0.35); }
        .btn-start:active { transform: scale(0.98); }

        .how-to-play {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.9rem;
            text-align: left;
        }
        .how-title { font-size: 0.75rem; font-weight: 800; color: var(--text); margin-bottom: 0.5rem; }
        .how-row { display: flex; gap: 0.5rem; align-items: flex-start; margin-bottom: 0.3rem; }
        .how-icon { font-size: 0.85rem; flex-shrink: 0; margin-top: 1px; }
        .how-text { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }

        /* ── GAME OVER ── */
        .gameover-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.4rem;
            padding: 1.4rem;
            text-align: center;
            animation: fadeUp 0.4s ease forwards;
        }
        .go-score-box {
            background: rgba(245,200,66,0.08);
            border: 1px solid rgba(245,200,66,0.18);
            border-radius: 1rem;
            padding: 1rem;
            margin: 0.75rem 0;
        }
        .go-score { font-family: 'Black Han Sans', sans-serif; font-size: 4.5rem; color: var(--gold); line-height: 1; }
        .go-score-label { font-size: 0.65rem; font-weight: 700; color: rgba(245,200,66,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem; }
        .stat-box { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.6rem 0.4rem; text-align: center; }
        .stat-box-val { font-family: 'Black Han Sans', sans-serif; font-size: 1.4rem; line-height: 1.1; }
        .stat-box-label { font-size: 0.6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
        .share-section { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 0.85rem; padding: 0.85rem; margin-bottom: 0.75rem; text-align: left; }
        .share-label { font-size: 0.6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
        .score-preview { background: #020608; border: 1px solid rgba(0,200,83,0.2); border-radius: 0.6rem; padding: 0.75rem; font-family: monospace; font-size: 0.75rem; color: #69F0AE; line-height: 1.7; white-space: pre; overflow-x: auto; margin-bottom: 0.5rem; }
        .share-btn { background: #25D366; color: white; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; padding: 0.75rem; border-radius: 0.65rem; border: none; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.2s; margin-bottom: 0.4rem; letter-spacing: 0.03em; }
        .share-btn:hover { filter: brightness(1.1); }
        .btn-row { display: flex; gap: 0.4rem; }
        .btn-sm { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700; padding: 0.6rem 0.75rem; border-radius: 0.6rem; cursor: pointer; flex: 1; transition: all 0.2s; }
        .btn-sm:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .btn-play-again { flex: 1; background: linear-gradient(135deg, #00C853, #00897B); border: none; color: white; font-family: 'Black Han Sans', sans-serif; font-size: 1.1rem; padding: 0.9rem; border-radius: 0.85rem; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
        .btn-play-again:hover { transform: scale(1.02); }
        .btn-home { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 1.1rem; padding: 0.9rem 1rem; border-radius: 0.85rem; cursor: pointer; }
        .btn-pair { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

        /* ── UTILS ── */
        .emoji-burst { position:fixed; pointer-events:none; font-size:1.8rem; z-index:1000; animation:burstUp 0.9s ease forwards; }
        canvas { display: none; }

        /* Team colour map used in JS */
        .rank-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 0.6rem; padding: 0.35rem 0.75rem; margin-bottom: 0.75rem; }
        .rank-emoji { font-size: 1.5rem; }
        .rank-text { font-family: 'Black Han Sans', sans-serif; font-size: 1.1rem; }
    </style>
</head>

// ── DAILY CHALLENGE SYSTEM ────────────────────────────────────────────────────
function getTodayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function getDailyPlayers() {
    // Seed by date so same players show for everyone on same day
    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
    const shuffled = [...PLAYERS];
    let s = seed;
    for (let i = shuffled.length - 1; i > 0; i--) {
        s = (s * 1103515245 + 12345) & 0x7fffffff;
        const j = s % (i + 1);
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, 10);
}

function getTrickyQuestion() {
    // Rotate through questions based on day of year
    const d = new Date();
    const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
    return TRICKY[dayOfYear % TRICKY.length];
}

function getDailyState() {
    const key = getTodayKey();
    const saved = localStorage.getItem('googlyDaily_' + key);
    return saved ? JSON.parse(saved) : null;
}

function saveDailyState(state) {
    const key = getTodayKey();
    localStorage.setItem('googlyDaily_' + key, JSON.stringify(state));
}

    // Update all mute buttons on screen
    document.querySelectorAll('#mute-btn').forEach(btn => {

        btn.title = G.muted ? 'Unmute' : 'Mute';

// ── HELPERS ────────────────────────────────────────────────────────────────────
function pickClues(p) {
    const h = p.clues.find(c=>c.highlight);
    const rest = p.clues.filter(c=>!c.highlight).sort(()=>Math.random()-0.5).slice(0,4);
    return [h,...rest];
}

function pickNext() {
    if(G.used.length>=PLAYERS.length) G.used=[];
    let idx; do{idx=Math.floor(Math.random()*PLAYERS.length);}while(G.used.includes(idx));
    G.used.push(idx);
    const p=PLAYERS[idx];
    const wrong=PLAYERS.filter((_,i)=>i!==idx).sort(()=>Math.random()-0.5).slice(0,3);
    G.current=p; G.clues=pickClues(p);
    G.options=[p,...wrong].sort(()=>Math.random()-0.5);
}

// ── SOUND ENGINE ──────────────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio() {
    if (!audioCtx) audioCtx = new AC();
    return audioCtx;
}

function playCorrect() { if(G.muted) return;
    try {
        const ctx = getAudio();
        // Stadium crowd cheer — layered noise burst with rising tone
        const t = ctx.currentTime;

        // Crowd noise — filtered white noise
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.8, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(800, t);
        filter.frequency.exponentialRampToValueAtTime(2000, t + 0.4);
        filter.Q.value = 0.8;
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0, t);
        noiseGain.gain.linearRampToValueAtTime(0.35, t + 0.05);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(ctx.destination);
        noise.start(t); noise.stop(t + 0.8);

        // Rising cheer tone
        const osc = ctx.createOscillator();
        const oscGain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.exponentialRampToValueAtTime(800, t + 0.15);
        osc.frequency.exponentialRampToValueAtTime(600, t + 0.4);
        oscGain.gain.setValueAtTime(0.25, t);
        oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.connect(oscGain); oscGain.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.5);

        // Ding — success note
        const ding = ctx.createOscillator();
        const dingGain = ctx.createGain();
        ding.type = 'triangle';
        ding.frequency.value = 1046; // C6
        dingGain.gain.setValueAtTime(0.3, t + 0.05);
        dingGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        ding.connect(dingGain); dingGain.connect(ctx.destination);
        ding.start(t + 0.05); ding.stop(t + 0.4);

    } catch(e) {}
}

function playWrong() { if(G.muted) return;
    try {
        const ctx = getAudio();
        const t = ctx.currentTime;

        // Boo sound — descending trombone-like tone
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(300, t);
        osc1.frequency.exponentialRampToValueAtTime(150, t + 0.4);
        gain1.gain.setValueAtTime(0.2, t);
        gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc1.connect(gain1); gain1.connect(ctx.destination);
        osc1.start(t); osc1.stop(t + 0.5);

        // Low crowd groan noise
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.6, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 400;
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.25, t);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(ctx.destination);
        noise.start(t); noise.stop(t + 0.6);

    } catch(e) {}
}

function playTimeUp() { if(G.muted) return;
    try {
        const ctx = getAudio();
        const t = ctx.currentTime;
        // Three descending beeps
        [0, 0.2, 0.4].forEach((delay, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = 600 - i * 100;
            osc.type = 'square';
            gain.gain.setValueAtTime(0.15, t + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.15);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(t + delay); osc.stop(t + delay + 0.15);
        });
    } catch(e) {}
}

function startTricky(){
    saveName();
    const todayKey = 'googlyTricky_'+getTodayKey();
    const saved = localStorage.getItem(todayKey);
    if(saved){
        const s = JSON.parse(saved);
        G.screen='tricky'; G.trickyQ=getTrickyQuestion();

        render(); return;
    }

function answerTricky(selected){
    const correct = selected === G.trickyQ.ans;
    G.trickyAnswered=true; G.trickyCorrect=correct;
    if(correct) playCorrect(); else playWrong();
    const todayKey = 'googlyTricky_'+getTodayKey();
    localStorage.setItem(todayKey, JSON.stringify({correct, ans:selected}));
    trackEvent('ipl_tricky',{correct, date:getTodayKey()});
    render();
}

function ans(name,btn){
    G.total++;
    const ok=name===G.current.name;
    if(btn){
        btn.classList.add(ok?'correct':'wrong');
        if(!ok)document.querySelectorAll('.btn-ans').forEach(b=>{if(b.dataset.name===G.current.name)b.classList.add('correct');});
        setTimeout(()=>document.querySelectorAll('.btn-ans').forEach(b=>b.classList.remove('correct','wrong')),650);
    }
    if(ok){
        playCorrect();
        G.correct++;G.streak++;
        if(G.streak>G.bestStreak)G.bestStreak=G.streak;
        G.score+=10+(G.streak*3);
        if(G.streak%5===0)G.timeLeft+=3;
        spawnE(['🏏','🔥','💥','⚡','🎯'][Math.floor(Math.random()*5)]);
        if(G.streak%3===0)toast(G.streak+' in a row! 🔥','#1B5E20');
    }else{
        playWrong();
        G.streak=0;
        toast('Was: '+G.current.name,'#7B1A1A');
    }

    if(G.mode==='daily'){
        G.dailyIndex++;
        if(G.dailyIndex>=G.dailyPlayers.length){
            // Daily complete
            clearInterval(timer);
            G.dailyDone=true; G.dailyScore=G.score;
            saveDailyState({done:true,score:G.score,correct:G.correct,total:G.total,bestStreak:G.bestStreak,date:getTodayKey()});
            trackEvent('ipl_daily_complete',{score:G.score,correct:G.correct});
            if(G.score>G.highScore){G.highScore=G.score;localStorage.setItem('iplHS',G.score.toString());}
            G.screen='gameover'; render(); return;
        }
        // Next daily player
        const p = G.dailyPlayers[G.dailyIndex];
        const wrong = PLAYERS.filter(pl=>pl.name!==p.name).sort(()=>Math.random()-0.5).slice(0,3);
        G.current=p; G.clues=pickClues(p); G.options=[p,...wrong].sort(()=>Math.random()-0.5);
        render(); return;
    }

    pickNext(); render();
}

function endGame(){
    clearInterval(timer); G.screen='gameover';
    if(G.score>G.highScore){G.highScore=G.score;localStorage.setItem('iplHS',G.score.toString());}
    trackEvent('ipl_end',{score:G.score,correct:G.correct});
    render();
}

function bar(n,m){return'█'.repeat(Math.min(n,m))+'░'.repeat(m-Math.min(n,m));}

function genText(){
    const acc=G.total>0?Math.round(G.correct/G.total*100):0;

    return`🏏 Googly — ${mode}\n👤 ${n}  •  📅 ${d}\n${'─'.repeat(28)}\n${emoji} Rank: ${rank}\n⭐ Score:     ${G.score}\n🔥 Streak:   ${G.bestStreak}  ${bar(G.bestStreak,10)}\n🎯 Accuracy: ${acc}%\n✅ Correct:  ${G.correct}/${G.total}\n${'─'.repeat(28)}\n🏅 Personal Best: ${G.highScore}\n\nCan you beat ${n}? 👇\nplaygoogly.in`;
}

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

    <div class="top-bar">
        <div class="top-stat">
            <div class="top-stat-label">Time</div>
            <div id="timer-val" class="top-stat-value" style="color:${tc}">${G.timeLeft}s</div>
        </div>
        <div class="top-stat">
            <div class="top-stat-label">Score</div>
            <div class="top-stat-value" style="color:var(--gold)">${G.score}</div>
        </div>
        <div class="top-stat">
            <div class="top-stat-label">Streak</div>
            <div class="top-stat-value" style="color:#FF8A65">${G.streak}🔥</div>
        </div>
        <div class="top-stat">
            <div class="top-stat-label">Correct</div>
            <div class="top-stat-value" style="color:var(--green)">${G.correct}/${G.total}</div>
        </div>
        <button onclick="toggleMute()" id="mute-btn" title="${G.muted?'Unmute':'Mute'}" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:var(--muted);font-size:1rem;width:34px;height:34px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;">${G.muted?'🔇':'🔊'}</button>
    </div>

    <div class="timer-wrap">
        <div class="timer-track">
            <div id="timer-fill" class="timer-fill" style="width:${pct}%;background:${tc}"></div>
        </div>
    </div>

    <div class="player-card" style="background:${tc2.bg}18">
        <div class="player-card-header" style="background:linear-gradient(135deg,${tc2.bg}40,transparent)">
            <div class="jersey" style="background:${tc2.bg}">
                <svg width="44" height="52" viewBox="0 0 44 52" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:0.85;z-index:1">
                    <path d="M22 4 C18 4 14 6 12 9 L4 14 L8 20 L12 17 L12 48 L32 48 L32 17 L36 20 L40 14 L32 9 C30 6 26 4 22 4Z" fill="rgba(255,255,255,0.9)"/>
                    <rect x="16" y="46" width="12" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
                </svg>
                <div class="jersey-label">${p.team}</div>
            </div>
            <div class="player-meta">
                <div class="player-role-badge" style="background:${tc2.bg}60;color:${tc2.accent};border:1px solid ${tc2.bg}">${p.role}</div>
                <div class="player-mystery">??? ???</div>
                <div class="player-mystery-sub">Who is this ${p.team} player?</div>
            </div>
        </div>
        <div class="clues-section">
            <div class="clues-label">🔍 Your Clues</div>
            <div class="clues-grid">
                ${G.clues.map((c,i)=>`
                    <div class="clue-chip ${c.color}${i===0?' full':''}">
                        <span class="chip-icon">${c.icon}</span>
                        <div class="chip-text">
                            <div class="chip-label">${c.label}</div>
                            <div class="chip-value">${c.value}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    </div>

    <div class="answers-grid">
        ${G.options.map(o=>`
            <button class="btn-ans" data-name="${o.name}" onclick="ans(this.dataset.name,this)">${o.name}</button>
        `).join('')}
    </div>

    <div style="text-align:center;font-size:0.65rem;color:var(--muted);padding:0.2rem 0">
        ${G.mode==='daily'
            ? `Daily Challenge · Player ${G.dailyIndex+1} of ${G.dailyPlayers.length}`
            : `Best Streak: ${G.bestStreak} 🔥  ·  Accuracy: ${acc}%`
        }
    </div>`;
}

function renderGameOver(){
    const acc=G.total>0?Math.round(G.correct/G.total*100):0;
    const isNew=G.score>0&&G.score===G.highScore;
    const{emoji,rank,color}=getRank(G.score);
    const n=G.playerName||'Player';
    const txt=genText();
    const muteBtn=`<button onclick="toggleMute()" id="mute-btn" title="${G.muted?'Unmute':'Mute'}" style="position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:var(--muted);font-size:1rem;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;">${G.muted?'🔇':'🔊'}</button>`;
    const waSVG=`<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

    return`<div class="gameover-card" style="position:relative">
        ${muteBtn}
        <div style="color:var(--muted);font-size:0.82rem;margin-bottom:4px">👤 ${n}</div>
        ${isNew
            ?`<div class="text-5xl mb-2 pop-in" style="font-size:3rem;margin-bottom:6px">🏆</div><div style="font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:var(--gold);margin-bottom:2px">NEW HIGH SCORE!</div>`
            :`<div style="font-size:2.5rem;margin-bottom:4px">⏱️</div><div style="font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:var(--text);margin-bottom:2px">TIME'S UP!</div>`
        }
        <div class="rank-badge">
            <span class="rank-emoji">${emoji}</span>
            <span class="rank-text" style="color:${color}">${rank}</span>
        </div>
        <div class="go-score-box">
            <div class="go-score-label">Final Score</div>
            <div class="go-score">${G.score}</div>
        </div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-box-val" style="color:#FF8A65">${G.bestStreak}🔥</div><div class="stat-box-label">Streak</div></div>
            <div class="stat-box"><div class="stat-box-val" style="color:#69F0AE">${acc}%</div><div class="stat-box-label">Accuracy</div></div>
            <div class="stat-box"><div class="stat-box-val" style="color:#81D4FA">${G.correct}/${G.total}</div><div class="stat-box-label">Correct</div></div>
        </div>
        <div class="share-section">
            <div class="share-label">Share Your Score</div>
            <div class="score-preview">${txt}</div>
            <button class="share-btn" onclick="shareWA()">${waSVG}Share on WhatsApp</button>
            <div class="btn-row" style="margin-top:0.4rem">
                <button id="cb" class="btn-sm" onclick="copyText()">📋 Copy</button>
                <button class="btn-sm" onclick="dlImg()">🖼️ Image</button>
            </div>
        </div>
        <div style="background:rgba(245,200,66,0.06);border:1px solid rgba(245,200,66,0.14);border-radius:0.75rem;padding:0.6rem;margin-bottom:0.75rem;text-align:center">
            <div style="font-size:0.6rem;color:rgba(245,200,66,0.4);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px">Personal Best</div>
            <div style="font-family:'Black Han Sans',sans-serif;font-size:2.2rem;color:var(--gold)">${G.highScore}</div>
        </div>
        <div class="btn-pair">
            <button class="btn-play-again" onclick="startGame()">PLAY AGAIN</button>
            <button class="btn-home" onclick="backToMenu()">🏠</button>
        </div>
    </div>`;
}

function renderTricky(){
    const q = G.trickyQ;
    const muteBtn=`<button onclick="toggleMute()" id="mute-btn" style="position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:var(--muted);font-size:1rem;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;">${G.muted?'🔇':'🔊'}</button>`;
    const today = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'});

    return`<div class="gameover-card" style="position:relative">
        ${muteBtn}
        <div style="font-size:0.7rem;color:rgba(255,107,0,0.6);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">🧠 Tricky Question · ${today}</div>

        <div style="background:rgba(255,107,0,0.08);border:1px solid rgba(255,107,0,0.2);border-radius:1rem;padding:1.2rem;margin-bottom:1rem;text-align:left">
            <div style="font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:#FFAB40;line-height:1.4">${q.q}</div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem">
            ${q.opts.map(opt => {
                let bg='rgba(255,255,255,0.05)';
                let border='rgba(255,255,255,0.1)';
                let color='var(--text)';
                if(G.trickyAnswered){
                    if(opt===q.ans){bg='rgba(0,200,83,0.15)';border='#00C853';color='#69F0AE';}
                    else if(opt!==q.ans){bg='rgba(255,255,255,0.03)';color='rgba(255,255,255,0.3)';}
                }
                return `<button ${G.trickyAnswered?'disabled':''} onclick="answerTricky('${opt.replace(/'/g,"\\'")}')"
                    style="background:${bg};border:1.5px solid ${border};color:${color};font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;padding:0.8rem 0.5rem;border-radius:0.75rem;cursor:${G.trickyAnswered?'default':'pointer'};text-align:center;line-height:1.3;transition:all 0.15s;">
                    ${opt}
                </button>`;
            }).join('')}
        </div>

        ${G.trickyAnswered ? `
            <div style="background:${G.trickyCorrect?'rgba(0,200,83,0.12)':'rgba(255,23,68,0.12)'};border:1px solid ${G.trickyCorrect?'rgba(0,200,83,0.3)':'rgba(255,23,68,0.3)'};border-radius:0.85rem;padding:1rem;margin-bottom:1rem;text-align:left">
                <div style="font-size:1.5rem;margin-bottom:4px">${G.trickyCorrect?'✅':'❌'}</div>
                <div style="font-size:0.85rem;font-weight:700;color:${G.trickyCorrect?'#69F0AE':'#FF8A80'};margin-bottom:4px">${G.trickyCorrect?'Correct!':'Wrong!'} The answer is: ${q.ans}</div>
                <div style="font-size:0.78rem;color:rgba(255,255,255,0.5);line-height:1.5">${q.fact}</div>
            </div>
        ` : ''}

        <button onclick="backToMenu()" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);font-family:'Black Han Sans',sans-serif;font-size:1rem;padding:0.8rem;border-radius:0.75rem;cursor:pointer;letter-spacing:0.04em;">
            ← BACK TO MENU
        </button>
    </div>`;
}

function render(){
    const r=document.getElementById('root');
    switch(G.screen){
        case'menu': r.innerHTML=renderMenu(); break;
        case'playing': r.innerHTML=renderGame(); break;
        case'gameover': r.innerHTML=renderGameOver(); break;
        case'tricky': r.innerHTML=renderTricky(); break;
    }
}
render();
</script>
</body>
</html>
